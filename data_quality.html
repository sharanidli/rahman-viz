<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {

    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    padding: 24px;
  }
  #header {
    text-align: center; margin-bottom: 24px;
  }
  #header h1 { font-size: 22px; font-weight: 700; color: #3D1C11; }
  #header p { font-size: 13px; color: #6B4226; margin-top: 4px; }

  .summary-cards {
    display: flex; gap: 16px; justify-content: center;
    flex-wrap: wrap; margin-bottom: 32px;
  }
  .summary-card {
    background: #EDE0D4; border-radius: 10px; padding: 20px 28px;
    text-align: center; border: 1px solid rgba(61,28,17,0.08);
    min-width: 140px;
  }
  .sc-value { font-size: 28px; font-weight: 800; color: #C62828; }
  .sc-label { font-size: 12px; color: #6B4226; margin-top: 4px; }

  .bar-legend {
    display: flex; gap: 20px; justify-content: center; margin-bottom: 16px;
    font-size: 12px; color: #6B4226;
  }
  .bar-legend span {
    display: inline-flex; align-items: center; gap: 6px;
  }
  .bar-legend .swatch {
    width: 12px; height: 12px; border-radius: 3px;
  }

  table {
    width: 100%; max-width: 1000px; margin: 0 auto;
    border-collapse: collapse;
  }
  th {
    text-align: left; padding: 10px 12px; font-size: 12px;
    color: #6B4226; text-transform: uppercase; letter-spacing: 0.5px;
    border-bottom: 2px solid rgba(61,28,17,0.15);
  }
  td {
    padding: 8px 12px; border-bottom: 1px solid rgba(61,28,17,0.06);
    font-size: 13px;
  }
  tr:hover { background: rgba(61,28,17,0.03); }
  .album-name { font-weight: 600; }
  .album-year { color: #6B4226; }

  .pct-bar {
    height: 14px; border-radius: 7px;
    background: rgba(61,28,17,0.06);
    overflow: hidden; min-width: 60px;
  }
  .pct-fill {
    height: 100%; border-radius: 7px;
  }
  .pct-fill.high { background: #558B2F; }
  .pct-fill.mid { background: #F9A825; }
  .pct-fill.low { background: #C62828; }

  .cell-flex {
    display: flex; align-items: center; gap: 8px;
  }
  .cell-pct { font-size: 11px; color: #8D6E63; min-width: 32px; }
</style>

const sc = document.getElementById('summary-cards');
const s = DATA.summary;
sc.innerHTML = `
  <div class="summary-card"><div class="sc-value">${s.total_albums}</div><div class="sc-label">Albums</div></div>
  <div class="summary-card"><div class="sc-value">${s.total_tracks}</div><div class="sc-label">Tracks</div></div>

  <div class="summary-card"><div class="sc-value">${s.lyricists_pct}%</div><div class="sc-label">Have Lyricists</div></div>
  <div class="summary-card"><div class="sc-value">${s.audio_pct}%</div><div class="sc-label">Have Audio Features</div></div>
`;

function pctBar(pct) {
  const cls = pct >= 80 ? 'high' : pct >= 40 ? 'mid' : 'low';
  return `<div class="cell-flex">
    <div class="pct-bar"><div class="pct-fill ${cls}" style="width:${pct}%"></div></div>
    <div class="cell-pct">${pct}%</div>
  </div>`;
}

const tbody = document.getElementById('table-body');
DATA.albums.forEach(a => {
  const row = document.createElement('tr');
  row.innerHTML = `
    <td class="album-name">${a.album}</td>
    <td class="album-year">${a.year || '?'}</td>
    <td>${a.total}</td>
    <td>${pctBar(a.singers_pct)}</td>
    <td>${pctBar(a.lyricists_pct)}</td>
    <td>${pctBar(a.audio_pct)}</td>
  `;
  tbody.appendChild(row);
});
