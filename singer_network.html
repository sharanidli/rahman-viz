const width = window.innerWidth;
const height = window.innerHeight;

const svg = document.getElementById('network');
svg.setAttribute('width', width);
svg.setAttribute('height', height);

function svgEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs || {})) el.setAttribute(k, v);
  return el;
}

// --- Map pre-computed positions to screen ---
const pad = 80;
const usableW = width - pad * 2;
const usableH = height - pad * 2;

const xs = DATA.nodes.map(n => n.x);
const ys = DATA.nodes.map(n => n.y);
const minX = Math.min(...xs), maxX = Math.max(...xs);
const minY = Math.min(...ys), maxY = Math.max(...ys);
const rangeX = maxX - minX || 1;
const rangeY = maxY - minY || 1;

// Scale uniformly to preserve aspect ratio
const scale = Math.min(usableW / rangeX, usableH / rangeY);
const offsetX = (width - rangeX * scale) / 2;
const offsetY = (height - rangeY * scale) / 2;

const maxTracks = Math.max(...DATA.nodes.map(n => n.tracks));

const nodes = DATA.nodes.map(n => ({
  ...n,
  x: offsetX + (n.x - minX) * scale,
  y: offsetY + (n.y - minY) * scale,
  radius: 4 + Math.sqrt(n.tracks / maxTracks) * 22,
}));

const nodeMap = {};
nodes.forEach(n => nodeMap[n.id] = n);

const edges = DATA.edges.map(e => ({
  ...e,
  sourceNode: nodeMap[e.source],
  targetNode: nodeMap[e.target],
}));

const maxWeight = Math.max(...edges.map(e => e.weight));

// SVG groups
const edgeGroup = svgEl('g');
const nodeGroup = svgEl('g');
svg.appendChild(edgeGroup);
svg.appendChild(nodeGroup);

// Edges
const edgeEls = edges.map(e => {
  const line = svgEl('line', {
    stroke: 'rgba(61,28,17,0.08)',
    'stroke-width': 0.5 + (e.weight / maxWeight) * 5,
  });
  edgeGroup.appendChild(line);

  const hitLine = svgEl('line', {
    stroke: 'transparent',
    'stroke-width': 14,
    style: 'cursor: pointer',
  });
  edgeGroup.appendChild(hitLine);

  hitLine.addEventListener('mouseenter', (ev) => showEdgeTooltip(ev, e));
  hitLine.addEventListener('mousemove', (ev) => moveEdgeTooltip(ev));
  hitLine.addEventListener('mouseleave', hideEdgeTooltip);

  return { line, hitLine, data: e };
});

// Color by track count — cinnamon to chilli red gradient
function nodeColor(tracks) {
  const t = Math.sqrt(tracks / maxTracks);
  const r = Math.round(141 + t * 57);   // 8D(141) -> C6(198)
  const g = Math.round(110 - t * 70);   // 6E(110) -> 28(40)
  const b = Math.round(99 - t * 59);    // 63(99)  -> 28(40)
  return `rgb(${r},${g},${b})`;
}

// Top 10 singers get visible labels by default
const top10Threshold = DATA.nodes.map(x => x.tracks).sort((a,b) => b-a)[9] || 0;

// Nodes
const nodeEls = nodes.map(n => {
  const g = svgEl('g');
  const color = nodeColor(n.tracks);
  const isTop10 = n.tracks >= top10Threshold;

  const glow = svgEl('circle', {
    r: n.radius + 6,
    fill: color,
    opacity: 0.08,
  });
  g.appendChild(glow);

  const circle = svgEl('circle', {
    r: n.radius,
    fill: color,
    stroke: 'rgba(61,28,17,0.3)',
    'stroke-width': 1,
    opacity: 0.9,
  });
  g.appendChild(circle);

  // All nodes get a label; hidden by default for non-top-10
  const text = svgEl('text', {
    'text-anchor': 'middle',
    dy: n.radius + 14,
    fill: isTop10 ? '#3D1C11' : '#6B4226',
    'font-size': n.tracks >= 10 ? '11px' : '9px',
    'font-weight': n.tracks >= 10 ? '600' : '400',
    'font-family': 'Segoe UI, system-ui, sans-serif',
    'pointer-events': 'none',
    opacity: isTop10 ? 1 : 0,
  });
  text.textContent = n.id;
  g.appendChild(text);

  g.setAttribute('transform', `translate(${n.x},${n.y})`);
  nodeGroup.appendChild(g);

  g.addEventListener('mouseenter', (ev) => showTooltip(ev, n));
  g.addEventListener('mousemove', (ev) => moveTooltip(ev));
  g.addEventListener('mouseleave', hideTooltip);

  const texts = g.querySelectorAll('text');
  return { g, glow, circle, texts, data: n, isTop10 };
});

// Render edges
edgeEls.forEach(e => {
  const s = e.data.sourceNode;
  const t = e.data.targetNode;
  e.line.setAttribute('x1', s.x); e.line.setAttribute('y1', s.y);
  e.line.setAttribute('x2', t.x); e.line.setAttribute('y2', t.y);
  e.hitLine.setAttribute('x1', s.x); e.hitLine.setAttribute('y1', s.y);
  e.hitLine.setAttribute('x2', t.x); e.hitLine.setAttribute('y2', t.y);
});

// --- Tooltips ---

const tooltip = document.getElementById('tooltip');
const edgeTooltip = document.getElementById('edge-tooltip');

function showTooltip(ev, n) {
  // Highlight connected edges, dim everything else
  edgeEls.forEach(e => {
    const connected = e.data.source === n.id || e.data.target === n.id;
    e.line.setAttribute('stroke', connected ? 'rgba(198,40,40,0.5)' : 'rgba(61,28,17,0.02)');
  });
  // Find the strongest connection
  const connEdges = edges.filter(e => e.source === n.id || e.target === n.id);
  let bestId = null, bestWeight = 0;
  connEdges.forEach(e => {
    if (e.weight > bestWeight) {
      bestWeight = e.weight;
      bestId = e.source === n.id ? e.target : e.source;
    }
  });

  // Hovered + strongest connection stay visible; everything else vanishes
  nodeEls.forEach(ne => {
    const isHovered = ne.data.id === n.id;
    const isBest = ne.data.id === bestId;
    ne.circle.setAttribute('opacity', (isHovered || isBest) ? 1 : 0);
    ne.glow.setAttribute('opacity', isHovered ? 0.3 : 0);
    ne.texts.forEach(t => t.setAttribute('opacity', (isHovered || isBest) ? 1 : 0));
    if (isHovered) {
      ne.circle.setAttribute('r', ne.data.radius * 1.4);
      ne.glow.setAttribute('r', (ne.data.radius + 6) * 1.4);
    }
  });

  let html = `<div class="tt-name">${n.id}</div>`;
  html += `<div class="tt-meta">${n.tracks} tracks &middot; ${n.album_count} albums</div>`;

  // Top 3 co-singers
  const cosingers = edges.filter(e => e.source === n.id || e.target === n.id)
    .map(e => ({ name: e.source === n.id ? e.target : e.source, weight: e.weight }))
    .sort((a, b) => b.weight - a.weight);
  if (cosingers.length) {
    html += `<div class="tt-section">Top duets</div>`;
    cosingers.slice(0, 3).forEach(c => {
      html += `<div style="color:#6B4226; font-size:12px">${c.name}: ${c.weight} tracks</div>`;
    });
  }

  tooltip.innerHTML = html;
  tooltip.style.display = 'block';
  moveTooltip(ev);
}

function moveTooltip(ev) {
  let x = ev.clientX + 16, y = ev.clientY + 16;
  if (x + 320 > width) x = ev.clientX - 330;
  if (y + 300 > height) y = ev.clientY - 300;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

function hideTooltip() {
  tooltip.style.display = 'none';
  edgeEls.forEach(e => e.line.setAttribute('stroke', 'rgba(61,28,17,0.08)'));
  nodeEls.forEach(ne => {
    ne.circle.setAttribute('opacity', 0.9);
    ne.circle.setAttribute('r', ne.data.radius);
    ne.glow.setAttribute('opacity', 0.08);
    ne.glow.setAttribute('r', ne.data.radius + 6);
    ne.texts.forEach(t => t.setAttribute('opacity', ne.isTop10 ? 1 : 0));
  });
}

function showEdgeTooltip(ev, e) {
  let html = `<div style="font-weight:700; color:#C62828; margin-bottom:4px">${e.source} &amp; ${e.target}</div>`;
  html += `<div style="color:#6B4226">${e.weight} track${e.weight > 1 ? 's' : ''} together</div>`;
  html += `<div style="color:#3D1C11; margin-top:4px">Albums: ${e.albums.join(', ')}</div>`;
  edgeTooltip.innerHTML = html;
  edgeTooltip.style.display = 'block';

  edgeEls.forEach(ee => {
    const isThis = ee.data === e;
    ee.line.setAttribute('stroke', isThis ? 'rgba(198,40,40,0.7)' : 'rgba(61,28,17,0.02)');
  });
  moveEdgeTooltip(ev);
}

function moveEdgeTooltip(ev) {
  let x = ev.clientX + 12, y = ev.clientY + 12;
  if (x + 280 > width) x = ev.clientX - 290;
  edgeTooltip.style.left = x + 'px';
  edgeTooltip.style.top = y + 'px';
}

function hideEdgeTooltip() {
  edgeTooltip.style.display = 'none';
  edgeEls.forEach(e => e.line.setAttribute('stroke', 'rgba(61,28,17,0.08)'));
}
</script>
