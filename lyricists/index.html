(function() {
  // Detect touch device
  if (!('ontouchstart' in window)) return;
  document.body.classList.add('touch-device');

  // Dismiss tooltips on tap-away
  document.addEventListener('click', function(e) {
    // Don't dismiss if tapping the tooltip itself
    if (e.target.closest('#tooltip') || e.target.closest('#edge-tooltip')) return;
    // Don't dismiss if tapping an interactive element (page handler will show new tooltip)
    if (e.target.closest('circle') || e.target.closest('.bar-row') ||
        e.target.closest('.dir-item') || e.target.closest('.cell') ||
        e.target.closest('line[style]') || e.target.closest('.dot') ||
        e.target.closest('.segment') || e.target.closest('rect[data-info]')) return;
    // Dismiss all tooltips
    var tt = document.getElementById('tooltip');
    var ett = document.getElementById('edge-tooltip');
    if (tt) tt.style.display = 'none';
    if (ett) ett.style.display = 'none';
  });

  // Recalculate SVG dimensions on orientation change
  window.addEventListener('orientationchange', function() {
    setTimeout(function() { window.dispatchEvent(new Event('resize')); }, 200);
  });
})();
</script>

function escHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function singerLink(raw) {
  if (!raw) return '';
  var M = window.__SINGER_MANIFEST, bp = window.__singerBasePath || '';
  var parts = raw.replace(/ & /g, ', ').split(',');
  var out = [];
  for (var i = 0; i < parts.length; i++) {
    var name = parts[i].trim();
    if (!name) continue;
    var slug = M[name];
    if (slug) out.push('<a href="' + bp + 'singers/' + slug + '.html" class="singer-link">' + escHtml(name) + '</a>');
    else out.push(escHtml(name));
  }
  return out.join(', ');
}
function lyricistLink(raw) {
  if (!raw) return '';
  var M = window.__LYRICIST_MANIFEST, bp = window.__lyricistBasePath || '';

  var out = [];
  for (var i = 0; i < parts.length; i++) {
    var name = parts[i].trim();
    if (!name) continue;
    var slug = M[name];
    if (slug) out.push('<a href="' + bp + 'lyricists/' + slug + '.html" class="lyricist-link">' + escHtml(name) + '</a>');
    else out.push(escHtml(name));
  }
  return out.join(', ');
}
</script>

// Build language filter options
const allLangs = new Set();
LYRICISTS.forEach(function(l) { l.languages.forEach(function(lang) { allLangs.add(lang); }); });
const langSelect = document.getElementById('lang-filter');
Array.from(allLangs).sort().forEach(function(l) {
  var opt = document.createElement('option');
  opt.value = l;
  opt.textContent = l;
  langSelect.appendChild(opt);
});

function render() {
  var q = document.getElementById('search').value.toLowerCase().trim();
  var sortBy = document.getElementById('sort').value;
  var langFilter = langSelect.value;

  var filtered = LYRICISTS.filter(function(l) {
    if (q && l.name.toLowerCase().indexOf(q) < 0) return false;
    if (langFilter !== 'All' && l.languages.indexOf(langFilter) < 0) return false;
    return true;
  });

  // Sort
  if (sortBy === 'tracks') {
    filtered.sort(function(a, b) { return b.tracks - a.tracks; });
  } else if (sortBy === 'alpha') {
    filtered.sort(function(a, b) { return a.name.localeCompare(b.name); });
  } else if (sortBy === 'films') {
    filtered.sort(function(a, b) { return b.films - a.films; });
  } else if (sortBy === 'recent') {
    filtered.sort(function(a, b) {
      var ya = a.years ? parseInt(a.years.split('\u2013').pop() || a.years) : 0;
      var yb = b.years ? parseInt(b.years.split('\u2013').pop() || b.years) : 0;
      return yb - ya;
    });
  }

  var html = '';
  filtered.forEach(function(l) {
    var langBadges = l.languages.map(function(lang) {
      return '<span class="lang-badge">' + lang + '</span>';
    }).join('');
    html += '<a class="lyricist-card" href="' + l.slug + '.html">';
    html += '<div class="lc-name">' + l.name + '</div>';
    html += '<div class="lc-stats">' + l.tracks + ' tracks &middot; ' + l.films + ' films</div>';
    html += '<div class="lc-years">' + l.years + '</div>';
    html += '<div class="lc-langs">' + langBadges + '</div>';
    html += '</a>';
  });

  document.getElementById('grid').innerHTML = html || '<div class="no-results">No lyricists match your search</div>';
  document.getElementById('result-count').textContent = filtered.length + ' of ' + LYRICISTS.length + ' lyricists';
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('sort').addEventListener('change', render);
langSelect.addEventListener('change', render);

render();
</script>
