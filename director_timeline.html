  const x = margin.left + i * colW + colW / 2;

  svg.appendChild(svgEl('line', {
    x1: x, y1: margin.top - 4,
    x2: x, y2: chartH - margin.bottom,
    stroke: 'rgba(61,28,17,0.08)', 'stroke-width': 1,
  }));

  // Year label at top
  const yt = svgEl('text', {
    x: x, y: margin.top - 8,
    'text-anchor': 'end', fill: '#6B4226', 'font-size': '11px',
    'font-weight': '600',
    'font-family': 'Segoe UI, system-ui, sans-serif',
    transform: `rotate(-55, ${x}, ${margin.top - 8})`,
  });
  yt.textContent = y;
  svg.appendChild(yt);
});

// --- Director labels (left side) + alternating row backgrounds ---
DATA.directors.forEach((d, i) => {
  const y = margin.top + i * rowH + rowH / 2;

  // Alternating row background
  if (i % 2 === 0) {
    svg.appendChild(svgEl('rect', {
      x: 0, y: y - rowH / 2,
      width: chartW, height: rowH,
      fill: 'rgba(61,28,17,0.03)',
    }));
  }

  // Director name
  const text = svgEl('text', {
    x: margin.left - 14, y: y + 4,
    'text-anchor': 'end', fill: '#3D1C11', 'font-size': '12.5px',
    'font-family': 'Segoe UI, system-ui, sans-serif',
  });
  text.textContent = d;
  svg.appendChild(text);

  // Film count badge
  const badge = svgEl('text', {
    x: margin.left - 10, y: y + 4,
    'text-anchor': 'start', fill: '#8D6E63', 'font-size': '10px',
    'font-family': 'Segoe UI, system-ui, sans-serif',
    'font-weight': '600',
  });
  badge.textContent = `(${DATA.directorTotals[d]})`;
  svg.appendChild(badge);
});

// --- Colour function: warm chilli gradient based on TOTAL films ---
// #D4A574 (light tan, few films) -> #C62828 (deep red, many films)
function dotColor(total) {
  const t = Math.pow(total / maxTotal, 0.7);  // gentle curve
  // #D4A574 = rgb(212,165,116)  ->  #C62828 = rgb(198,40,40)
  const r = Math.round(212 + t * (198 - 212));
  const g = Math.round(165 + t * (40 - 165));
  const b = Math.round(116 + t * (40 - 116));
  return `rgb(${r},${g},${b})`;
}

// --- Dots ---
const tooltip = document.getElementById('tooltip');
const dotGroup = svgEl('g');
svg.appendChild(dotGroup);

DATA.cells.forEach(c => {
  const col = yearIdx[c.year];
  const row = dirIdx[c.director];
  if (col === undefined || row === undefined) return;

  const cx = margin.left + col * colW + colW / 2;
  const cy = margin.top + row * rowH + rowH / 2;
  const r = 4 + Math.sqrt(c.count / maxCount) * 10;
  const color = dotColor(DATA.directorTotals[c.director]);

  const circle = svgEl('circle', {
    cx: cx, cy: cy, r: r,
    fill: color, opacity: 0.85,
    stroke: 'rgba(61,28,17,0.18)', 'stroke-width': 0.5,
  });
  dotGroup.appendChild(circle);

  function showDotTooltip(ev) {
    let html = `<div style="font-weight:700; color:${color}; font-size:14px">${c.director}</div>`;
    html += `<div style="color:#6B4226; font-size:12px; margin-bottom:6px">${c.year} &mdash; ${c.count} film${c.count > 1 ? 's' : ''}</div>`;
    c.albumDetails.forEach(ad => {
      html += `<div style="color:#3D1C11; font-size:12px">&bull; ${ad.album}`;
      if (ad.language && ad.language !== '\u2014') {
        html += ` <span style="color:#8D6E63; font-size:11px">(${ad.language})</span>`;
      }
      html += `</div>`;
    });
    tooltip.innerHTML = html;
    tooltip.style.display = 'block';
    circle.setAttribute('r', r + 2);
    circle.setAttribute('opacity', 1);
    moveTooltip(ev);
  }
  circle.addEventListener('mouseenter', (ev) => {
    if (document.body.classList.contains('touch-device')) return;
    showDotTooltip(ev);
  });
  circle.addEventListener('mousemove', moveTooltip);
  circle.addEventListener('mouseleave', () => {
    tooltip.style.display = 'none';
    circle.setAttribute('r', r);
    circle.setAttribute('opacity', 0.85);
  });
  circle.addEventListener('click', (ev) => {
    if (!document.body.classList.contains('touch-device')) return;
    showDotTooltip(ev);
  });
});

function moveTooltip(ev) {
  if (window.innerWidth < 768) {
    tooltip.style.left = '8px';
    tooltip.style.right = '8px';
    tooltip.style.width = 'auto';
    tooltip.style.maxWidth = 'none';
    tooltip.style.bottom = '56px';
    tooltip.style.top = 'auto';
    return;
  }
  let x = ev.clientX + 14, y = ev.clientY + 14;
  if (x + 340 > window.innerWidth) x = ev.clientX - 350;
  if (y + 200 > window.innerHeight) y = ev.clientY - 200;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

// --- Mobile card view ---
if (window.innerWidth < 768) {
  const container = document.getElementById('mobile-cards');
  const dirCells = {};
  DATA.cells.forEach(c => {
    if (!dirCells[c.director]) dirCells[c.director] = [];
    dirCells[c.director].push(c);
  });
  const minY = Math.min(...DATA.years);
  const maxY = Math.max(...DATA.years);
  const yearSpan = maxY - minY || 1;

  DATA.directors.forEach(d => {
    const total = DATA.directorTotals[d];
    const cells = (dirCells[d] || []).sort((a, b) => a.year - b.year);
    const color = dotColor(total);

    const langs = new Set();
    cells.forEach(c => c.albumDetails.forEach(a => {
      if (a.language && a.language !== '\u2014') langs.add(a.language);
    }));

    let spark = '<div class="sparkline">';
    cells.forEach(c => {
      const pct = ((c.year - minY) / yearSpan * 100).toFixed(1);
      const size = 6 + Math.sqrt(c.count) * 4;
      spark += '<div class="spark-dot" style="left:' + pct + '%;width:' + size + 'px;height:' + size + 'px;background:' + color + ';"></div>';
    });
    spark += '</div>';

    let details = '<div class="dir-details">';
    cells.forEach(c => {
      c.albumDetails.forEach(a => {
        details += '<div class="film-entry"><span class="film-year">' + c.year + '</span>' + a.album;
        if (a.language && a.language !== '\u2014') details += ' <span class="film-lang">(' + a.language + ')</span>';
        details += '</div>';
      });
    });
    details += '</div>';

    const firstY = cells.length ? cells[0].year : minY;
    const lastY = cells.length ? cells[cells.length - 1].year : maxY;

    const card = document.createElement('div');
    card.className = 'dir-card';
    card.innerHTML = '<div class="dir-header"><span class="dir-name">' + d + '</span><span class="dir-count">' + total + ' film' + (total > 1 ? 's' : '') + '</span></div>'
      + spark
      + '<div class="dir-meta"><span>\u2019' + String(firstY).slice(2) + '</span><span>\u2019' + String(lastY).slice(2) + '</span></div>'
      + '<div class="dir-langs">' + [...langs].join(', ') + '</div>'
      + details;
    card.addEventListener('click', function() { this.classList.toggle('expanded'); });
    container.appendChild(card);
  });
}
</script>

<script>
document.addEventListener('keydown', function(e) {
  var tag = document.activeElement.tagName;
  if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA') return;
  if (e.key === 'ArrowLeft') {
    var prev = document.querySelector('.tour-prev');
    if (prev) prev.click();
  } else if (e.key === 'ArrowRight') {
    var next = document.querySelector('.tour-next');
    if (next) next.click();
  }
});
// Auto-hide tour bar on scroll down, show on scroll up
(function() {
  var nav = document.getElementById('tour-nav');
  if (!nav) return;
  var lastY = window.scrollY || window.pageYOffset;
  var delta = 0;
  var THRESHOLD = 50;
  window.addEventListener('scroll', function() {
    var y = window.scrollY || window.pageYOffset;
    var diff = y - lastY;
    if ((delta > 0 && diff > 0) || (delta < 0 && diff < 0)) {
      delta += diff;
    } else {
      delta = diff;
    }
    if (delta > THRESHOLD && y > 60) {
      nav.classList.add('hidden');
    } else if (delta < -THRESHOLD) {
      nav.classList.remove('hidden');
    }
    lastY = y;
  }, { passive: true });
})();
</script>
