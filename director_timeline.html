, "year": 1999, "count": 1, "albumDetails": [{"album": "Padayappa", "language": "\u2014"}]}, {"director": "K. S. Ravikumar", "year": 2000, "count": 1, "albumDetails": [{"album": "Thenali", "language": "Tamil"}]}, {"director": "K. S. Ravikumar", "year": 2006, "count": 1, "albumDetails": [{"album": "Varalaru", "language": "Tamil"}]}, {"director": "Imtiaz Ali", "year": 2011, "count": 1, "albumDetails": [{"album": "Rockstar", "language": "Hindi"}]}, {"director": "Imtiaz Ali", "year": 2015, "count": 1, "albumDetails": [{"album": "Tamasha", "language": "Hindi"}]}, {"director": "Imtiaz Ali", "year": 2024, "count": 1, "albumDetails": [{"album": "Amar Singh Chamkila", "language": "Hindi"}]}, {"director": "S. J. Suryah", "year": 2004, "count": 2, "albumDetails": [{"album": "Naani", "language": "Telugu"}, {"album": "New", "language": "\u2014"}]}, {"director": "S. J. Suryah", "year": 2005, "count": 1, "albumDetails": [{"album": "Anbe Aaruyire", "language": "\u2014"}]}, {"director": "Aanand L. Rai", "year": 2013, "count": 1, "albumDetails": [{"album": "Raanjhanaa", "language": "Hindi"}]}, {"director": "Aanand L. Rai", "year": 2021, "count": 1, "albumDetails": [{"album": "Atrangi Re", "language": "Hindi"}]}, {"director": "Aanand L. Rai", "year": 2025, "count": 1, "albumDetails": [{"album": "Tere Ishk Mein", "language": "English"}]}, {"director": "Deepa Mehta", "year": 1996, "count": 1, "albumDetails": [{"album": "Fire", "language": "English"}]}, {"director": "Deepa Mehta", "year": 1998, "count": 1, "albumDetails": [{"album": "Earth", "language": "\u2014"}]}, {"director": "Deepa Mehta", "year": 2005, "count": 1, "albumDetails": [{"album": "Water", "language": "Hindi"}]}, {"director": "Rajkumar Santoshi", "year": 2000, "count": 1, "albumDetails": [{"album": "Pukar", "language": "Hindi"}]}, {"director": "Rajkumar Santoshi", "year": 2002, "count": 1, "albumDetails": [{"album": "The Legend of Bhagat Singh", "language": "\u2014"}]}, {"director": "Rajkumar Santoshi", "year": 2023, "count": 1, "albumDetails": [{"album": "Gandhi Godse Ek Yudh", "language": "\u2014"}]}, {"director": "Ashutosh Gowariker", "year": 2004, "count": 1, "albumDetails": [{"album": "Swades", "language": "Hindi"}]}, {"director": "Ashutosh Gowariker", "year": 2008, "count": 1, "albumDetails": [{"album": "Jodhaa Akbar", "language": "Hindi"}]}, {"director": "Ashutosh Gowariker", "year": 2016, "count": 1, "albumDetails": [{"album": "Mohenjo Daro", "language": "Hindi"}]}, {"director": "Rajiv Menon", "year": 1997, "count": 1, "albumDetails": [{"album": "Minsara Kanavu", "language": "Tamil"}]}, {"director": "Rajiv Menon", "year": 2000, "count": 1, "albumDetails": [{"album": "Kandukondain Kandukondain", "language": "\u2014"}]}, {"director": "Rajiv Menon", "year": 2019, "count": 1, "albumDetails": [{"album": "Sarvam Thaala Mayam", "language": "Tamil"}]}, {"director": "Subhash Ghai", "year": 1999, "count": 1, "albumDetails": [{"album": "Taal", "language": "Hindi"}]}, {"director": "Subhash Ghai", "year": 2005, "count": 1, "albumDetails": [{"album": "Kisna The Warrior Poet", "language": "Hindi; English"}]}, {"director": "Subhash Ghai", "year": 2008, "count": 1, "albumDetails": [{"album": "Yuvvraaj", "language": "Hindi"}]}, {"director": "Danny Boyle", "year": 2008, "count": 1, "albumDetails": [{"album": "Slumdog Millionaire", "language": "English"}]}, {"director": "Danny Boyle", "year": 2010, "count": 1, "albumDetails": [{"album": "127 Hours", "language": "English"}]}, {"director": "Suresh Krissna", "year": 1999, "count": 1, "albumDetails": [{"album": "Sangamam", "language": "\u2014"}]}, {"director": "Suresh Krissna", "year": 2002, "count": 1, "albumDetails": [{"album": "Baba", "language": "\u2014"}]}, {"director": "Majid Majidi", "year": 2015, "count": 1, "albumDetails": [{"album": "Muhammad The Messenger of God", "language": "Persian; Aramaic; Arabic"}]}, {"director": "Majid Majidi", "year": 2017, "count": 1, "albumDetails": [{"album": "Beyond the Clouds", "language": "Hindi"}]}, {"director": "Atlee", "year": 2017, "count": 1, "albumDetails": [{"album": "Mersal", "language": "Tamil"}]}, {"director": "Atlee", "year": 2019, "count": 1, "albumDetails": [{"album": "Bigil", "language": "English"}]}, {"director": "Gurinder Chadha", "year": 2017, "count": 1, "albumDetails": [{"album": "Viceroys House", "language": "English; Hindi"}]}, {"director": "Gurinder Chadha", "year": 2019, "count": 1, "albumDetails": [{"album": "Blinded by the Light", "language": "English"}]}, {"director": "Laxman Utekar", "year": 2021, "count": 1, "albumDetails": [{"album": "Mimi", "language": "Hindi"}]}, {"director": "Laxman Utekar", "year": 2025, "count": 1, "albumDetails": [{"album": "Chhaava", "language": "English"}]}]};

const rowH = 36;
const colW = 42;
const labelW = 220;
const headerH = 55;
const margin = { top: headerH, left: labelW, right: 30, bottom: 20 };

const chartW = margin.left + DATA.years.length * colW + margin.right;
const chartH = margin.top + DATA.directors.length * rowH + margin.bottom;

const svg = document.getElementById('chart');
svg.setAttribute('width', chartW);
svg.setAttribute('height', chartH);

function svgEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs || {})) el.setAttribute(k, v);
  return el;
}

// Index maps
const dirIdx = {};
DATA.directors.forEach((d, i) => dirIdx[d] = i);
const yearIdx = {};
DATA.years.forEach((y, i) => yearIdx[y] = i);

// Max total (for colour scaling)
const maxTotal = Math.max(...DATA.directors.map(d => DATA.directorTotals[d]));
// Max count in a single cell (for dot size scaling)
const maxCount = Math.max(...DATA.cells.map(c => c.count));

// --- Vertical grid lines for each year ---
DATA.years.forEach((y, i) => {
  const x = margin.left + i * colW + colW / 2;

  svg.appendChild(svgEl('line', {
    x1: x, y1: margin.top - 4,
    x2: x, y2: chartH - margin.bottom,
    stroke: 'rgba(61,28,17,0.08)', 'stroke-width': 1,
  }));

  // Year label at top
  const yt = svgEl('text', {
    x: x, y: margin.top - 8,
    'text-anchor': 'end', fill: '#6B4226', 'font-size': '11px',
    'font-weight': '600',
    'font-family': 'Segoe UI, system-ui, sans-serif',
    transform: `rotate(-55, ${x}, ${margin.top - 8})`,
  });
  yt.textContent = y;
  svg.appendChild(yt);
});

// --- Director labels (left side) + alternating row backgrounds ---
DATA.directors.forEach((d, i) => {
  const y = margin.top + i * rowH + rowH / 2;

  // Alternating row background
  if (i % 2 === 0) {
    svg.appendChild(svgEl('rect', {
      x: 0, y: y - rowH / 2,
      width: chartW, height: rowH,
      fill: 'rgba(61,28,17,0.03)',
    }));
  }

  // Director name
  const text = svgEl('text', {
    x: margin.left - 14, y: y + 4,
    'text-anchor': 'end', fill: '#3D1C11', 'font-size': '12.5px',
    'font-family': 'Segoe UI, system-ui, sans-serif',
  });
  text.textContent = d;
  svg.appendChild(text);

  // Film count badge
  const badge = svgEl('text', {
    x: margin.left - 10, y: y + 4,
    'text-anchor': 'start', fill: '#8D6E63', 'font-size': '10px',
    'font-family': 'Segoe UI, system-ui, sans-serif',
    'font-weight': '600',
  });
  badge.textContent = `(${DATA.directorTotals[d]})`;
  svg.appendChild(badge);
});

// --- Colour function: warm chilli gradient based on TOTAL films ---
// #D4A574 (light tan, few films) -> #C62828 (deep red, many films)
function dotColor(total) {
  const t = Math.pow(total / maxTotal, 0.7);  // gentle curve
  // #D4A574 = rgb(212,165,116)  ->  #C62828 = rgb(198,40,40)
  const r = Math.round(212 + t * (198 - 212));
  const g = Math.round(165 + t * (40 - 165));
  const b = Math.round(116 + t * (40 - 116));
  return `rgb(${r},${g},${b})`;
}

// --- Dots ---
const tooltip = document.getElementById('tooltip');
const dotGroup = svgEl('g');
svg.appendChild(dotGroup);

DATA.cells.forEach(c => {
  const col = yearIdx[c.year];
  const row = dirIdx[c.director];
  if (col === undefined || row === undefined) return;

  const cx = margin.left + col * colW + colW / 2;
  const cy = margin.top + row * rowH + rowH / 2;
  const r = 4 + Math.sqrt(c.count / maxCount) * 10;
  const color = dotColor(DATA.directorTotals[c.director]);

  const circle = svgEl('circle', {
    cx: cx, cy: cy, r: r,
    fill: color, opacity: 0.85,
    stroke: 'rgba(61,28,17,0.18)', 'stroke-width': 0.5,
  });
  dotGroup.appendChild(circle);

  circle.addEventListener('mouseenter', (ev) => {
    let html = `<div style="font-weight:700; color:${color}; font-size:14px">${c.director}</div>`;
    html += `<div style="color:#6B4226; font-size:12px; margin-bottom:6px">${c.year} &mdash; ${c.count} film${c.count > 1 ? 's' : ''}</div>`;
    c.albumDetails.forEach(ad => {
      html += `<div style="color:#3D1C11; font-size:12px">&bull; ${ad.album}`;
      if (ad.language && ad.language !== '\u2014') {
        html += ` <span style="color:#8D6E63; font-size:11px">(${ad.language})</span>`;
      }
      html += `</div>`;
    });
    tooltip.innerHTML = html;
    tooltip.style.display = 'block';
    circle.setAttribute('r', r + 2);
    circle.setAttribute('opacity', 1);
    moveTooltip(ev);
  });

  circle.addEventListener('mousemove', moveTooltip);

  circle.addEventListener('mouseleave', () => {
    tooltip.style.display = 'none';
    circle.setAttribute('r', r);
    circle.setAttribute('opacity', 0.85);
  });
});

function moveTooltip(ev) {
  let x = ev.clientX + 14, y = ev.clientY + 14;
  if (x + 340 > window.innerWidth) x = ev.clientX - 350;
  if (y + 200 > window.innerHeight) y = ev.clientY - 200;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}
</script>
