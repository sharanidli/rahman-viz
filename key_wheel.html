const W = 700, H = 600;
const cx = W / 2, cy = H / 2;
const outerR = 240;
const innerR = 80;

const svg = document.getElementById('chart');
svg.setAttribute('width', W);
svg.setAttribute('height', H);

function svgEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs || {})) el.setAttribute(k, v);
  return el;
}

const tooltip = document.getElementById('tooltip');
const trackList = document.getElementById('track-list');
const trackListContent = document.getElementById('track-list-content');

document.getElementById('track-list-close').addEventListener('click', () => {
  trackList.style.display = 'none';
});

// --- Draw the wheel ---
// Each key gets a slice (30 degrees). Within each slice: inner ring = minor, outer ring = major.
// Bar height proportional to count.

const sliceAngle = (2 * Math.PI) / 12;
const gap = 0.02;  // gap between slices in radians

DATA.wheel.forEach((d, i) => {
  const startAngle = -Math.PI / 2 + i * sliceAngle + gap / 2;
  const endAngle = startAngle + sliceAngle - gap;

  // Scale: bar extends from innerR outward proportional to count
  const majorR = innerR + (d.major / DATA.maxTotal) * (outerR - innerR);
  const minorR = innerR + (d.minor / DATA.maxTotal) * (outerR - innerR);

  // Draw two half-arcs: left half = minor, right half = major
  const midAngle = (startAngle + endAngle) / 2;

  // Major (right half of slice)
  if (d.major > 0) {
    const path = arcPath(cx, cy, innerR, majorR, midAngle + 0.005, endAngle);
    const majorArc = svgEl('path', {
      d: path,
      fill: '#C62828',
      opacity: 0.8,
      stroke: '#F5E6D3',
      'stroke-width': 1,
      style: 'cursor: pointer',
    });
    svg.appendChild(majorArc);
    addEvents(majorArc, d, 'Major');
  }

  // Minor (left half of slice)
  if (d.minor > 0) {
    const path = arcPath(cx, cy, innerR, minorR, startAngle, midAngle - 0.005);
    const minorArc = svgEl('path', {
      d: path,
      fill: '#8D6E63',
      opacity: 0.8,
      stroke: '#F5E6D3',
      'stroke-width': 1,
      style: 'cursor: pointer',
    });
    svg.appendChild(minorArc);
    addEvents(minorArc, d, 'Minor');
  }

  // Empty background if no tracks
  if (d.total === 0) {
    const path = arcPath(cx, cy, innerR, innerR + 15, startAngle, endAngle);
    const emptyArc = svgEl('path', {
      d: path,
      fill: 'rgba(61,28,17,0.08)',
      stroke: '#F5E6D3',
      'stroke-width': 1,
    });
    svg.appendChild(emptyArc);
  }

  // Key name label
  const labelAngle = (startAngle + endAngle) / 2;
  const labelR = outerR + 24;
  const lx = cx + Math.cos(labelAngle) * labelR;
  const ly = cy + Math.sin(labelAngle) * labelR;
  const label = svgEl('text', {
    x: lx, y: ly,
    'text-anchor': 'middle', 'dominant-baseline': 'middle',
    fill: d.total > 0 ? '#3D1C11' : '#6B4226',
    'font-size': '13px', 'font-weight': '700',
    'font-family': 'Segoe UI, system-ui, sans-serif',
  });
  label.textContent = d.keyName;
  svg.appendChild(label);

  // Count label
  if (d.total > 0) {
    const countR = innerR + (d.total / DATA.maxTotal) * (outerR - innerR) / 2 + innerR * 0.1;
    const countAngle = (startAngle + endAngle) / 2;
    const countX = cx + Math.cos(countAngle) * Math.min(countR, (innerR + outerR) / 2);
    const countY = cy + Math.sin(countAngle) * Math.min(countR, (innerR + outerR) / 2);
    const countLabel = svgEl('text', {
      x: countX, y: countY,
      'text-anchor': 'middle', 'dominant-baseline': 'middle',
      fill: '#3D1C11', 'font-size': '11px', 'font-weight': '600',
      'font-family': 'Segoe UI, system-ui, sans-serif',
      'pointer-events': 'none',
    });
    countLabel.textContent = d.total;
    svg.appendChild(countLabel);
  }
});

// Center circle
svg.appendChild(svgEl('circle', {
  cx: cx, cy: cy, r: innerR - 2,
  fill: '#F5E6D3', stroke: 'rgba(61,28,17,0.08)', 'stroke-width': 1,
}));

// Center text
const centerText1 = svgEl('text', {
  x: cx, y: cy - 8,
  'text-anchor': 'middle', fill: '#6B4226', 'font-size': '12px',
  'font-family': 'Segoe UI, system-ui, sans-serif',
});
centerText1.textContent = 'Musical';
svg.appendChild(centerText1);
const centerText2 = svgEl('text', {
  x: cx, y: cy + 10,
  'text-anchor': 'middle', fill: '#6B4226', 'font-size': '12px',
  'font-family': 'Segoe UI, system-ui, sans-serif',
});
centerText2.textContent = 'Keys';
svg.appendChild(centerText2);

// --- Helper: draw arc path ---
function arcPath(cx, cy, r1, r2, a1, a2) {
  const x1i = cx + Math.cos(a1) * r1;
  const y1i = cy + Math.sin(a1) * r1;
  const x1o = cx + Math.cos(a1) * r2;
  const y1o = cy + Math.sin(a1) * r2;
  const x2i = cx + Math.cos(a2) * r1;
  const y2i = cy + Math.sin(a2) * r1;
  const x2o = cx + Math.cos(a2) * r2;
  const y2o = cy + Math.sin(a2) * r2;
  const large = (a2 - a1 > Math.PI) ? 1 : 0;
  return `M ${x1i} ${y1i} L ${x1o} ${y1o} A ${r2} ${r2} 0 ${large} 1 ${x2o} ${y2o} L ${x2i} ${y2i} A ${r1} ${r1} 0 ${large} 0 ${x1i} ${y1i} Z`;
}

// --- Events ---
function addEvents(el, d, modeFilter) {
  function showSegmentTooltip(ev) {
    el.setAttribute('opacity', 1);
    let html = `<div style="font-weight:700; font-size:16px; color:#C62828">${d.keyName} ${modeFilter}</div>`;
    const count = modeFilter === 'Major' ? d.major : d.minor;
    html += `<div style="color:#3D1C11; margin-top:4px">${count} track${count > 1 ? 's' : ''}</div>`;
    html += `<div style="color:#6B4226; margin-top:2px">${d.keyName} total: ${d.total} tracks (${d.major} major, ${d.minor} minor)</div>`;
    tooltip.innerHTML = html;
    tooltip.style.display = 'block';
    moveTooltip(ev);
  }
  el.addEventListener('mouseenter', (ev) => {
    if (document.body.classList.contains('touch-device')) return;
    showSegmentTooltip(ev);
  });
  el.addEventListener('mousemove', moveTooltip);
  el.addEventListener('mouseleave', () => {
    el.setAttribute('opacity', 0.8);
    tooltip.style.display = 'none';
  });
  el.addEventListener('click', (ev) => {
    if (document.body.classList.contains('touch-device') && tooltip.style.display !== 'block') {
      showSegmentTooltip(ev);
      return;
    }
    showTrackList(d.key, modeFilter);
  });
}

function moveTooltip(ev) {
  let x = ev.clientX + 14, y = ev.clientY + 14;
  if (x + 300 > window.innerWidth) x = ev.clientX - 310;
  if (y + 150 > window.innerHeight) y = ev.clientY - 150;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

function showTrackList(key, modeFilter) {
  const mode = modeFilter === 'Major' ? 1 : 0;
  const filtered = DATA.tracks.filter(t => t.key === key && t.mode === mode);
  const keyName = DATA.keyNames[key];

  let html = `<h3>${keyName} ${modeFilter} — ${filtered.length} tracks</h3>`;
  filtered.sort((a, b) => (a.album || '').localeCompare(b.album || ''));
  filtered.forEach(t => {
    const year = t.year || '?';
    html += `<div class="track-item">${t.title} <span style="color:#6B4226">— ${t.album} (${year})</span></div>`;
  });
  trackListContent.innerHTML = html;
  trackList.style.display = 'block';
}
