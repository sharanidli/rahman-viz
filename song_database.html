<script>
(function() {
  // Detect touch device
  if (!('ontouchstart' in window)) return;
  document.body.classList.add('touch-device');

  // Dismiss tooltips on tap-away
  document.addEventListener('click', function(e) {
    // Don't dismiss if tapping the tooltip itself
    if (e.target.closest('#tooltip') || e.target.closest('#edge-tooltip')) return;
    // Don't dismiss if tapping an interactive element (page handler will show new tooltip)
    if (e.target.closest('circle') || e.target.closest('.bar-row') ||
        e.target.closest('.dir-item') || e.target.closest('.cell') ||
        e.target.closest('line[style]') || e.target.closest('.dot') ||
        e.target.closest('.segment') || e.target.closest('rect[data-info]')) return;
    // Dismiss all tooltips
    var tt = document.getElementById('tooltip');
    var ett = document.getElementById('edge-tooltip');
    if (tt) tt.style.display = 'none';
    if (ett) ett.style.display = 'none';
  });

  // Recalculate SVG dimensions on orientation change
  window.addEventListener('orientationchange', function() {
    setTimeout(function() { window.dispatchEvent(new Event('resize')); }, 200);
  });
})();
</script>

var resultsEl = document.getElementById('results');
var statsEl = document.getElementById('stats');

function renderAlbums() {
  activeDiscover = null;
  renderDiscover();
  resultsEl.style.display = 'none';
  albumsEl.style.display = '';

  var visAlbums = 0, visTracks = 0, html = '';

  D.a.forEach(function(album, ai) {
    var atracks = [];
    D.t.forEach(function(t, ti) { if (t.ai === ai && langMatch(t)) atracks.push(ti); });
    if (atracks.length === 0) return;
    visAlbums++;
    visTracks += atracks.length;

    var year = album.y || '?';
    var dir = album.d ? ' &middot; ' + esc(album.d) : '';

    html += '<div class="db-album" id="album-' + ai + '">';
    html += '<div class="db-album-head" onclick="toggleAlbum(' + ai + ')">';
    html += '<div class="db-album-name">' + esc(albumDisplay(album)) + '</div>';
    html += '<div class="db-album-info">' + year + dir + '</div>';
    html += '<div class="db-album-badge">' + atracks.length + ' tracks</div>';
    html += '<div class="db-album-arrow">&#9656;</div>';
    html += '</div>';
    html += '<div class="db-track-list">';
    atracks.forEach(function(ti) {
      var t = D.t[ti];
      html += '<div class="db-track" onclick="toggleTrack(' + ti + ',event)">';
      if (t.af) html += '<div class="db-audio-dot"></div>';
      html += '<div class="db-track-title">' + esc(t.t) + '</div>';
      if (t.s) html += '<div class="db-track-singers">' + esc(t.s) + '</div>';
      html += '</div>';
      html += '<div class="db-detail" id="detail-' + ti + '"></div>';
    });
    html += '</div></div>';
  });

  albumsEl.innerHTML = html;
  statsEl.textContent = visTracks + ' tracks across ' + visAlbums + ' albums' +
    (activeLang !== 'All' ? ' (' + activeLang + ')' : '');
  checkHash();
}

function toggleAlbum(ai) {
  document.getElementById('album-' + ai).classList.toggle('open');
}

// ── Track detail ──
var openTrack = null;

function toggleTrack(ti, event) {
  if (event) event.stopPropagation();
  var detailEl = document.getElementById('detail-' + ti);

  if (openTrack === ti) {
    detailEl.classList.remove('open');
    detailEl.innerHTML = '';
    openTrack = null;
    history.replaceState(null, '', window.location.pathname);
    return;
  }

  if (openTrack !== null) {
    var prev = document.getElementById('detail-' + openTrack);
    if (prev) { prev.classList.remove('open'); prev.innerHTML = ''; }
  }

  openTrack = ti;
  detailEl.innerHTML = buildDetail(ti);
  detailEl.classList.add('open');

  var t = D.t[ti], a = D.a[t.ai];
  history.replaceState(null, '', '#' + makeSlug(t.t, a.n, a.y));
  detailEl.scrollIntoView({behavior: 'smooth', block: 'nearest'});
}

function makeSlug(title, album, year) {
  return (title + '-' + album + '-' + (year || ''))
    .toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

function buildDetail(ti) {
  var t = D.t[ti], a = D.a[t.ai];
  var year = a.y || '?';
  var ytUrl = 'https://www.youtube.com/results?search_query=' +
    encodeURIComponent(t.t + ' ' + a.n + ' AR Rahman');

  var h = '<div class="db-detail-header">';
  h += '<span class="db-detail-title">' + esc(t.t) + '</span>';
  h += '<a class="db-detail-yt" href="' + ytUrl + '" target="_blank" rel="noopener">&#9654; YouTube</a>';
  h += '</div>';

  h += '<div class="db-detail-meta">' + esc(albumDisplay(a)) + ' (' + year + ')';
  if (a.d) h += ' &middot; ' + esc(a.d);
  h += '</div>';
  if (t.s) h += '<div class="db-detail-meta"><strong>Singers:</strong> ' + esc(t.s) + '</div>';
  if (t.ly) h += '<div class="db-detail-meta"><strong>Lyricist:</strong> ' + esc(t.ly) + '</div>';

  if (t.af) {
    var hasAllFeats = FEAT_KEYS.every(function(k) { return t.af[k] != null; });
    if (hasAllFeats) {
      h += '<div class="db-audio-section">';
      h += '<div>' + radarSVG(t.af, 100) + '</div>';
      h += '<div class="db-features">';
      FEAT_KEYS.forEach(function(k) {
        var val = t.af[k];
        h += '<div class="db-feat-row"><span class="db-feat-label">' +
          FEAT_NAMES[k] + '</span><span class="db-feat-val">' + val.toFixed(2) + '</span></div>';
      });
      if (t.af.src) {
        var srcLabel = t.af.src === 'both' ? 'Spotify + librosa' :
                       t.af.src === 'spotify' ? 'Spotify only' : 'Predicted from audio';
        h += '<div class="db-key-info">Source: ' + srcLabel + '</div>';
      }
      h += '</div></div>';
    } else {
      h += '<div class="db-audio-section"><div class="db-features">';
      FEAT_KEYS.forEach(function(k) {
        var val = t.af[k];
        if (val != null) {
          h += '<div class="db-feat-row"><span class="db-feat-label">' +
            FEAT_NAMES[k] + '</span><span class="db-feat-val">' + val.toFixed(2) + '</span></div>';
        }
      });
      h += '</div></div>';
    }

    if (t.sb && t.sb.length > 0) {
      h += '<div class="db-siblings"><h4>Similar tracks</h4>';
      t.sb.forEach(function(s) {
        var st = D.t[s.i], sa = D.a[st.ai];
        h += '<span class="db-sib" onclick="jumpToTrack(' + s.i + ')">' +
          esc(st.t) + ' <span class="db-sib-sim">' + Math.round(s.s * 100) + '%</span></span>';
      });
      h += '</div>';
    }
  } else {
    h += '<div class="db-no-audio">No audio data available</div>';
  }

  return h;
}

function radarSVG(af, size) {
  var cx = size / 2, cy = size / 2, r = size / 2 - 8;
  var n = FEAT_KEYS.length;
  function pt(i, val) {
    var angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    return [cx + r * val * Math.cos(angle), cy + r * val * Math.sin(angle)];
  }

  var svg = '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '">';
  [0.25, 0.5, 0.75, 1].forEach(function(ring) {
    var pts = '';
    for (var i = 0; i < n; i++) { var p = pt(i, ring); pts += p[0] + ',' + p[1] + ' '; }
    svg += '<polygon points="' + pts + '" fill="none" stroke="rgba(26,26,46,' +
      (ring === 1 ? '0.15' : '0.07') + ')" stroke-width="0.5"/>';
  });
  for (var i = 0; i < n; i++) {
    var p = pt(i, 1);
    svg += '<line x1="' + cx + '" y1="' + cy + '" x2="' + p[0] + '" y2="' + p[1] +
      '" stroke="rgba(26,26,46,0.08)" stroke-width="0.5"/>';
  }
  // Draw data polygon; if valence is predicted, draw valence segment dashed
  var dataPts = '';
  for (var i = 0; i < n; i++) { var p = pt(i, af[FEAT_KEYS[i]]); dataPts += p[0] + ',' + p[1] + ' '; }
  svg += '<polygon points="' + dataPts + '" fill="rgba(192,32,104,0.15)" stroke="#C02068" stroke-width="1.5"/>';
  if (af.vp) {
    // Overlay dashed line for the valence segment (index 2 = va)
    var vaIdx = 2;
    var prevIdx = (vaIdx - 1 + n) % n;
    var nextIdx = (vaIdx + 1) % n;
    var pPrev = pt(prevIdx, af[FEAT_KEYS[prevIdx]]);
    var pVa = pt(vaIdx, af[FEAT_KEYS[vaIdx]]);
    var pNext = pt(nextIdx, af[FEAT_KEYS[nextIdx]]);
    svg += '<line x1="' + pPrev[0] + '" y1="' + pPrev[1] + '" x2="' + pVa[0] + '" y2="' + pVa[1] +
      '" stroke="#C02068" stroke-width="1.5" stroke-dasharray="3,2"/>';
    svg += '<line x1="' + pVa[0] + '" y1="' + pVa[1] + '" x2="' + pNext[0] + '" y2="' + pNext[1] +
      '" stroke="#C02068" stroke-width="1.5" stroke-dasharray="3,2"/>';
  }
  for (var i = 0; i < n; i++) {
    var p = pt(i, af[FEAT_KEYS[i]]);
    var opacity = (i === 2 && af.vp) ? '0.5' : '1';
    svg += '<circle cx="' + p[0] + '" cy="' + p[1] + '" r="2" fill="#C02068" opacity="' + opacity + '"/>';
  }
  svg += '</svg>';
  return svg;
}

// ── Search ──
var searchEl = document.getElementById('search');
var searchTimeout;

searchEl.addEventListener('input', function() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(doSearch, 150);
});

function doSearch() {
  var q = searchEl.value.toLowerCase().trim();
  if (q.length < 2) { resultsEl.style.display = 'none'; albumsEl.style.display = ''; return; }

  albumsEl.style.display = 'none';
  resultsEl.style.display = 'block';

  var singerHits = [], lyricistHits = [], titleHits = [], albumHits = [];
  D.t.forEach(function(t, i) {
    if (!langMatch(t)) return;
    if (t.t.toLowerCase().indexOf(q) >= 0) titleHits.push(i);
    if (t.s && t.s.toLowerCase().indexOf(q) >= 0) singerHits.push(i);
    if (t.ly && t.ly.toLowerCase().indexOf(q) >= 0) lyricistHits.push(i);
  });
  D.a.forEach(function(a, ai) {
    if (a.n.toLowerCase().indexOf(q) >= 0) {
      D.t.forEach(function(t, ti) { if (t.ai === ai && langMatch(t)) albumHits.push(ti); });
    }
  });

  var html = '';
  var safeQ = esc(q);

  if (singerHits.length > 3) {
    html += '<div class="db-result-group" onclick="showSingerResults(\'' + safeQ + '\')">' +
      singerHits.length + ' tracks with singer matching &ldquo;' + safeQ + '&rdquo;</div>';
  }
  if (lyricistHits.length > 3) {
    html += '<div class="db-result-group" onclick="showLyricistResults(\'' + safeQ + '\')">' +
      lyricistHits.length + ' tracks with lyricist matching &ldquo;' + safeQ + '&rdquo;</div>';
  }
  if (albumHits.length > 3) {
    var albumObj = null;
    D.a.forEach(function(a) { if (a.n.toLowerCase().indexOf(q) >= 0 && !albumObj) albumObj = a; });
    html += '<div class="db-result-group" onclick="showAlbumResults(\'' + safeQ + '\')">' +
      albumHits.length + ' tracks from &ldquo;' + esc(albumObj ? albumDisplay(albumObj) : q) + '&rdquo;</div>';
  }

  var shown = {};
  var all = titleHits.concat(singerHits, lyricistHits, albumHits).filter(function(i) {
    if (shown[i]) return false; shown[i] = true; return true;
  });

  all.slice(0, 20).forEach(function(ti) {
    var t = D.t[ti], a = D.a[t.ai];
    html += '<div class="db-result" onclick="expandFromSearch(' + ti + ')">';
    html += '<div><div class="db-result-title">' + esc(t.t) + '</div>';
    if (t.s) html += '<div class="db-result-singers">' + esc(t.s) + '</div>';
    html += '</div>';
    html += '<div class="db-result-meta">' + esc(albumDisplay(a)) + ' (' + (a.y || '?') + ')</div>';
    html += '</div>';
  });

  if (all.length > 20) {
    html += '<div class="db-show-more" onclick="showAllResults()">Show all ' + all.length + ' results</div>';
  }

  if (!html) {
    html = '<div style="text-align:center;padding:20px;color:#888898;font-size:14px">No results for &ldquo;' + safeQ + '&rdquo;</div>';
  }
  resultsEl.innerHTML = html;
}

function showSingerResults(q) {
  var hits = [];
  D.t.forEach(function(t, i) { if (t.s && t.s.toLowerCase().indexOf(q.toLowerCase()) >= 0 && langMatch(t)) hits.push(i); });
  showTrackList(hits, 'Singer: "' + q + '"');
}
function showLyricistResults(q) {
  var hits = [];
  D.t.forEach(function(t, i) { if (t.ly && t.ly.toLowerCase().indexOf(q.toLowerCase()) >= 0 && langMatch(t)) hits.push(i); });
  showTrackList(hits, 'Lyricist: "' + q + '"');
}
function showAlbumResults(q) {
  var hits = [];
  D.a.forEach(function(a, ai) {
    if (a.n.toLowerCase().indexOf(q.toLowerCase()) >= 0) {
      D.t.forEach(function(t, ti) { if (t.ai === ai && langMatch(t)) hits.push(ti); });
    }
  });
  showTrackList(hits, 'Album: "' + q + '"');
}
function showAllResults() {
  var q = searchEl.value.toLowerCase().trim();
  var shown = {};
  var all = [];
  D.t.forEach(function(t, i) {
    if (!langMatch(t)) return;
    if (t.t.toLowerCase().indexOf(q) >= 0 || (t.s && t.s.toLowerCase().indexOf(q) >= 0) ||
        (t.ly && t.ly.toLowerCase().indexOf(q) >= 0)) {
      if (!shown[i]) { shown[i] = true; all.push(i); }
    }
  });
  D.a.forEach(function(a, ai) {
    if (a.n.toLowerCase().indexOf(q) >= 0) {
      D.t.forEach(function(t, ti) { if (t.ai === ai && langMatch(t) && !shown[ti]) { shown[ti] = true; all.push(ti); } });
    }
  });
  showTrackList(all, 'Search: "' + q + '"');
}

function showTrackList(indices, label) {
  resultsEl.style.display = 'block';
  albumsEl.style.display = 'none';
  var h = '<div class="db-back" onclick="backToBrowse()">&larr; Back to browse</div>';
  h += '<div style="padding:4px 0 8px;font-size:14px;font-weight:600;color:#1A1A2E">' +
    esc(label) + ' &mdash; ' + indices.length + ' tracks</div>';
  indices.forEach(function(ti) {
    var t = D.t[ti], a = D.a[t.ai];
    h += '<div class="db-result" onclick="expandFromSearch(' + ti + ')">';
    h += '<div><div class="db-result-title">' + esc(t.t) + '</div>';
    if (t.s) h += '<div class="db-result-singers">' + esc(t.s) + '</div>';
    h += '</div>';
    h += '<div class="db-result-meta">' + esc(albumDisplay(a)) + ' (' + (a.y || '?') + ')</div>';
    h += '</div>';
  });
  resultsEl.innerHTML = h;
}

function backToBrowse() {
  searchEl.value = '';
  resultsEl.style.display = 'none';
  albumsEl.style.display = '';
  activeDiscover = null;
  renderDiscover();
}

function expandFromSearch(ti) {
  searchEl.value = '';
  resultsEl.style.display = 'none';
  albumsEl.style.display = '';
  renderAlbums();
  var t = D.t[ti];
  var albumEl = document.getElementById('album-' + t.ai);
  if (albumEl && !albumEl.classList.contains('open')) { albumEl.classList.add('open'); }
  setTimeout(function() { toggleTrack(ti, null); }, 50);
}

function jumpToTrack(ti) {
  var t = D.t[ti];
  var albumEl = document.getElementById('album-' + t.ai);
  if (albumEl && !albumEl.classList.contains('open')) { albumEl.classList.add('open'); }
  setTimeout(function() { toggleTrack(ti, null); }, 50);
}

// ── Random song ──
function randomSong() {
  var good = [];
  D.t.forEach(function(t, i) { if (t.s && langMatch(t)) good.push(i); });
  if (good.length === 0) return;
  var withAudio = good.filter(function(i) { return D.t[i].af; });
  var pool = withAudio.length > 0 ? withAudio : good;
  expandFromSearch(pool[Math.floor(Math.random() * pool.length)]);
}

// ── URL hash ──
function checkHash() {
  var hash = window.location.hash.slice(1);
  if (!hash) return;
  for (var ti = 0; ti < D.t.length; ti++) {
    var t = D.t[ti], a = D.a[t.ai];
    if (makeSlug(t.t, a.n, a.y) === hash) {
      var albumEl = document.getElementById('album-' + t.ai);
      if (albumEl && !albumEl.classList.contains('open')) { albumEl.classList.add('open'); }
      setTimeout(function() { toggleTrack(ti, null); }, 100);
      return;
    }
  }
}
window.addEventListener('hashchange', checkHash);

// ── Init ──
renderFilters();
renderDiscover();
renderAlbums();
</script>

<script>
document.addEventListener('keydown', function(e) {
  var tag = document.activeElement.tagName;
  if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA') return;
  if (e.key === 'ArrowLeft') {
    var prev = document.querySelector('.tour-prev');
    if (prev) prev.click();
  } else if (e.key === 'ArrowRight') {
    var next = document.querySelector('.tour-next');
    if (next) next.click();
  }
});
// Auto-hide tour bar on scroll down, show on scroll up
(function() {
  var nav = document.getElementById('tour-nav');
  if (!nav) return;
  var lastY = window.scrollY || window.pageYOffset;
  var delta = 0;
  var THRESHOLD = 50;
  window.addEventListener('scroll', function() {
    var y = window.scrollY || window.pageYOffset;
    var diff = y - lastY;
    if ((delta > 0 && diff > 0) || (delta < 0 && diff < 0)) {
      delta += diff;
    } else {
      delta = diff;
    }
    if (delta > THRESHOLD && y > 60) {
      nav.classList.add('hidden');
    } else if (delta < -THRESHOLD) {
      nav.classList.remove('hidden');
    }
    lastY = y;
  }, { passive: true });
})();
</script>

    <textarea name="message" placeholder="What did you like? What could be better?" required></textarea>
    <input type="email" name="_replyto" placeholder="Email (optional)">
    <div class="fb-hint">We read every message.</div>
    <input type="hidden" name="_subject" value="Rahman Viz Feedback">

<script>
function toggleFeedback() {
  var p = document.getElementById('feedback-panel');
  p.classList.toggle('open');
  document.getElementById('fb-page').value = location.pathname;
}
document.getElementById('feedback-form').addEventListener('submit', function(e) {
  e.preventDefault();
  var form = this;
  fetch(form.action, {
    method: 'POST',
    body: new FormData(form),
    headers: { 'Accept': 'application/json' }
  }).then(function(r) {
    if (r.ok) {
      form.innerHTML = '<div class="fb-thanks">Thanks for your feedback!</div>';
      setTimeout(function() {
        document.getElementById('feedback-panel').classList.remove('open');
      }, 2000);
    }
  });
});
document.addEventListener('click', function(e) {
  var panel = document.getElementById('feedback-panel');
  var btn = document.getElementById('feedback-btn');
  if (panel.classList.contains('open') && !panel.contains(e.target) && e.target !== btn) {
    panel.classList.remove('open');
  }
});
</script>
