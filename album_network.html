  }
  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    padding: 16px 24px;
    background: linear-gradient(180deg, rgba(10,10,26,0.95) 0%, rgba(10,10,26,0) 100%);
    pointer-events: none;
  }
  #header h1 { font-size: 22px; font-weight: 700; color: #fff; }
  #header p { font-size: 13px; color: #888; margin-top: 4px; }

  svg { display: block; }

  /* Tooltip */
  #tooltip {
    position: fixed;
    pointer-events: none;
    background: rgba(20, 20, 40, 0.96);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 13px;
    line-height: 1.5;
    max-width: 320px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    display: none;
    z-index: 100;
    backdrop-filter: blur(8px);
  }
  #tooltip .tt-album { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  #tooltip .tt-meta { color: #aaa; font-size: 12px; margin-bottom: 8px; }
  #tooltip .tt-section { color: #888; font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.5px; margin-top: 8px; margin-bottom: 2px; }
  #tooltip .tt-singers { color: #ccc; }

  /* Edge tooltip */
  #edge-tooltip {
    position: fixed;
    pointer-events: none;
    background: rgba(20, 20, 40, 0.96);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    line-height: 1.5;
    max-width: 280px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    display: none;
    z-index: 100;
    backdrop-filter: blur(8px);
  }

  /* Legend */
  #legend {
    position: fixed; bottom: 20px; left: 20px; z-index: 10;
    background: rgba(20, 20, 40, 0.85);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 12px;
    backdrop-filter: blur(8px);
  }
  #legend h3 { font-size: 11px; text-transform: uppercase; color: #888;
    letter-spacing: 0.5px; margin-bottom: 8px; }
  .legend-item { display: flex; align-items: center; margin-bottom: 4px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 8px;
    border: 1px solid rgba(255,255,255,0.3); }

  /* Instructions */
  #instructions {
    position: fixed; bottom: 20px; right: 20px; z-index: 10;
    color: #555; font-size: 11px; text-align: right;
  }
</style>
</head>

const width = window.innerWidth;
const height = window.innerHeight;

const svg = document.getElementById('network');
svg.setAttribute('width', width);
svg.setAttribute('height', height);

// Create SVG namespace helper
function svgEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs || {})) el.setAttribute(k, v);
  return el;
}

// --- Map pre-computed positions to screen ---
const pad = 100;
const usableW = width - pad * 2;
const usableH = height - pad * 2;

// Find bounds of pre-computed positions
const xs = DATA.nodes.map(n => n.x);
const ys = DATA.nodes.map(n => n.y);
const minX = Math.min(...xs), maxX = Math.max(...xs);
const minY = Math.min(...ys), maxY = Math.max(...ys);
const rangeX = maxX - minX || 1;
const rangeY = maxY - minY || 1;

const nodes = DATA.nodes.map(n => ({
  ...n,
  x: pad + ((n.x - minX) / rangeX) * usableW,
  y: pad + ((n.y - minY) / rangeY) * usableH,
  radius: 12 + Math.sqrt(n.singer_count) * 8,
}));

const nodeMap = {};
nodes.forEach(n => nodeMap[n.id] = n);

const edges = DATA.edges.map(e => ({
  ...e,
  sourceNode: nodeMap[e.source],
  targetNode: nodeMap[e.target],
}));

const maxWeight = Math.max(...edges.map(e => e.weight));

// SVG groups
const edgeGroup = svgEl('g');
const nodeGroup = svgEl('g');
svg.appendChild(edgeGroup);
svg.appendChild(nodeGroup);

// Create edge elements
const edgeEls = edges.map(e => {
  const line = svgEl('line', {
    stroke: 'rgba(255,255,255,0.15)',
    'stroke-width': 1 + (e.weight / maxWeight) * 7,
    'data-source': e.source,
    'data-target': e.target,
  });
  edgeGroup.appendChild(line);

  // Invisible wider line for hover target
  const hitLine = svgEl('line', {
    stroke: 'transparent',
    'stroke-width': 16,
    style: 'cursor: pointer',
  });
  edgeGroup.appendChild(hitLine);

  hitLine.addEventListener('mouseenter', (ev) => showEdgeTooltip(ev, e));
  hitLine.addEventListener('mousemove', (ev) => moveEdgeTooltip(ev));
  hitLine.addEventListener('mouseleave', hideEdgeTooltip);

  return { line, hitLine, data: e };
});

  // Glow
  const glow = svgEl('circle', {
    r: n.radius + 8,
    fill: langColors[n.primary_language] || '#999',
    opacity: 0.08,
  });
  g.appendChild(glow);

  // Main circle
  const circle = svgEl('circle', {
    r: n.radius,
    fill: langColors[n.primary_language] || '#999',
    stroke: 'rgba(255,255,255,0.4)',
    'stroke-width': 1.5,
    opacity: 0.9,
  });
  g.appendChild(circle);

  // Label — only for top 5 albums
  if (n.singer_count >= top5Threshold) {
    const text = svgEl('text', {
      'text-anchor': 'middle',
      dy: n.radius + 16,
      fill: '#ccc',
      'font-size': '11px',
      'font-weight': '600',
      'font-family': 'Segoe UI, system-ui, sans-serif',
      'pointer-events': 'none',
    });
    text.textContent = n.id;
    g.appendChild(text);

    if (n.year) {
      const yearText = svgEl('text', {
        'text-anchor': 'middle',
        dy: n.radius + 29,
        fill: '#777',
        'font-size': '10px',
        'font-family': 'Segoe UI, system-ui, sans-serif',
        'pointer-events': 'none',
      });
      yearText.textContent = n.year;
      g.appendChild(yearText);
    }
  }

  nodeGroup.appendChild(g);

  // Events
  g.addEventListener('mouseenter', (ev) => showTooltip(ev, n));
  g.addEventListener('mousemove', (ev) => moveTooltip(ev));
  g.addEventListener('mouseleave', hideTooltip);

  // Collect text elements for dimming
  const texts = g.querySelectorAll('text');
  return { g, glow, circle, texts, data: n };
});

function render() {
  for (const e of edgeEls) {
    const s = e.data.sourceNode;
    const t = e.data.targetNode;
    e.line.setAttribute('x1', s.x);
    e.line.setAttribute('y1', s.y);
    e.line.setAttribute('x2', t.x);
    e.line.setAttribute('y2', t.y);
    e.hitLine.setAttribute('x1', s.x);
    e.hitLine.setAttribute('y1', s.y);
    e.hitLine.setAttribute('x2', t.x);
    e.hitLine.setAttribute('y2', t.y);
  }
  for (const n of nodeEls) {
    n.g.setAttribute('transform', `translate(${n.data.x},${n.data.y})`);
  }
}

render();

// --- Tooltips ---

const tooltip = document.getElementById('tooltip');
const edgeTooltip = document.getElementById('edge-tooltip');

function showTooltip(ev, n) {
  // Highlight connected edges, dim everything else
  edgeEls.forEach(e => {
    const connected = e.data.source === n.id || e.data.target === n.id;
    e.line.setAttribute('stroke', connected ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.02)');
  });
  // Find the strongest connection
  const connEdges = edges.filter(e => e.source === n.id || e.target === n.id);
  let bestId = null, bestWeight = 0;
  connEdges.forEach(e => {
    if (e.weight > bestWeight) {
      bestWeight = e.weight;
      bestId = e.source === n.id ? e.target : e.source;
    }
  });

  // Hovered + strongest connection stay visible; everything else vanishes
  nodeEls.forEach(ne => {
    const isHovered = ne.data.id === n.id;
    const isBest = ne.data.id === bestId;
    ne.circle.setAttribute('opacity', (isHovered || isBest) ? 1 : 0);
    ne.glow.setAttribute('opacity', isHovered ? 0.3 : 0);
    ne.texts.forEach(t => t.setAttribute('opacity', (isHovered || isBest) ? 1 : 0));
    if (isHovered) {
      ne.circle.setAttribute('r', ne.data.radius * 1.3);
      ne.glow.setAttribute('r', (ne.data.radius + 8) * 1.3);
    }
  });

  let html = `<div class="tt-album" style="color:${langColors[n.primary_language]}">${n.id}</div>`;
  html += `<div class="tt-meta">`;
  if (n.year) html += `${n.year}`;
  if (n.director) html += ` &middot; Dir: ${n.director}`;
  html += ` &middot; ${n.languages.join(', ')}`;
  html += `</div>`;
  html += `<div class="tt-meta">${n.track_count} tracks &middot; ${n.singer_count} singers</div>`;

  // Top 3 connections only
  const connections = edges.filter(e => e.source === n.id || e.target === n.id)
    .sort((a, b) => b.weight - a.weight);
  if (connections.length) {
    html += `<div class="tt-section">Top connections</div>`;
    connections.slice(0, 3).forEach(e => {
      const other = e.source === n.id ? e.target : e.source;
      html += `<div style="color:#aaa; font-size:12px">${other}: ${e.weight} shared</div>`;
    });
  }

  tooltip.innerHTML = html;
  tooltip.style.display = 'block';
  moveTooltip(ev);
}

function moveTooltip(ev) {
  let x = ev.clientX + 16;
  let y = ev.clientY + 16;
  if (x + 320 > width) x = ev.clientX - 330;
  if (y + 300 > height) y = ev.clientY - 300;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

function hideTooltip() {
  tooltip.style.display = 'none';
  edgeEls.forEach(e => e.line.setAttribute('stroke', 'rgba(255,255,255,0.15)'));
  nodeEls.forEach(ne => {
    ne.circle.setAttribute('opacity', 0.9);
    ne.circle.setAttribute('r', ne.data.radius);
    ne.glow.setAttribute('opacity', 0.08);
    ne.glow.setAttribute('r', ne.data.radius + 8);
    ne.texts.forEach(t => t.setAttribute('opacity', 1));
  });
}

function showEdgeTooltip(ev, e) {
  let html = `<div style="font-weight:700; margin-bottom:4px">`;
  html += `${e.source} &harr; ${e.target}</div>`;
  html += `<div style="color:#aaa">${e.weight} shared singer${e.weight > 1 ? 's' : ''}:</div>`;
  html += `<div style="color:#ccc; margin-top:2px">${e.singers.join(', ')}</div>`;
  edgeTooltip.innerHTML = html;
  edgeTooltip.style.display = 'block';

  // Highlight this edge
  edgeEls.forEach(ee => {
    const isThis = ee.data === e;
    ee.line.setAttribute('stroke', isThis ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.05)');
  });
  moveEdgeTooltip(ev);
}

function moveEdgeTooltip(ev) {
  let x = ev.clientX + 12;
  let y = ev.clientY + 12;
  if (x + 280 > width) x = ev.clientX - 290;
  edgeTooltip.style.left = x + 'px';
  edgeTooltip.style.top = y + 'px';
}

function hideEdgeTooltip() {
  edgeTooltip.style.display = 'none';
  edgeEls.forEach(e => e.line.setAttribute('stroke', 'rgba(255,255,255,0.15)'));
}
</script>
