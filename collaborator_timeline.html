  const color = `rgb(${red},${green},${blue})`;

  const circle = svgEl('circle', {
    cx: cx, cy: cy, r: r,
    fill: color, opacity: 0.85,
    stroke: 'rgba(255,255,255,0.15)', 'stroke-width': 0.5,
  });
  dotGroup.appendChild(circle);

  circle.addEventListener('mouseenter', (ev) => {
    const year = DATA.albumYears[c.album] || '?';
    const dir = DATA.albumDirectors[c.album] || '';
    let html = `<div style="font-weight:700; color:${color}; font-size:14px">${c.singer}</div>`;
    html += `<div style="color:#aaa; font-size:12px; margin-bottom:6px">${c.album} (${year})${dir ? ' — Dir: ' + dir : ''}</div>`;
    html += `<div style="color:#ddd">${c.tracks} track${c.tracks > 1 ? 's' : ''} on this album</div>`;
    tooltip.innerHTML = html;
    tooltip.style.display = 'block';

    // Highlight row + column
    circle.setAttribute('r', r + 2);
    circle.setAttribute('opacity', 1);
    moveTooltip(ev);
  });

  circle.addEventListener('mousemove', moveTooltip);

  circle.addEventListener('mouseleave', () => {
    tooltip.style.display = 'none';
    circle.setAttribute('r', r);
    circle.setAttribute('opacity', 0.85);
  });
});

function moveTooltip(ev) {
  let x = ev.clientX + 14, y = ev.clientY + 14;
  if (x + 280 > window.innerWidth) x = ev.clientX - 290;
  if (y + 150 > window.innerHeight) y = ev.clientY - 150;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}
</script>
</body>
</html>
