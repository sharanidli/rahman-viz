agan", "tracks": 2}, {"singer": "K. J. Yesudas", "album": "Kandukondain Kandukondain", "tracks": 1}]};

const rowH = 32;
const colW = 38;
const labelW = 200;
const headerH = 50;
const margin = { top: headerH, left: labelW, right: 30, bottom: 20 };

const chartW = margin.left + DATA.albums.length * colW + margin.right;
const chartH = margin.top + DATA.singers.length * rowH + margin.bottom;

const svg = document.getElementById('chart');
svg.setAttribute('width', chartW);
svg.setAttribute('height', chartH);

function svgEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs || {})) el.setAttribute(k, v);
  return el;
}

// Singer index / album index maps
const singerIdx = {};
DATA.singers.forEach((s, i) => singerIdx[s] = i);
const albumIdx = {};
DATA.albums.forEach((a, i) => albumIdx[a] = i);

// --- Year groups: draw vertical separators between years ---
let prevYear = null;
DATA.albums.forEach((a, i) => {
  const year = DATA.albumYears[a];
  const x = margin.left + i * colW + colW / 2;

  if (year && year !== prevYear) {
    // Year label at top
    const yt = svgEl('text', {
      x: x, y: margin.top - 8,
      'text-anchor': 'middle', fill: '#666', 'font-size': '11px',
      'font-weight': '600',
      'font-family': 'Segoe UI, system-ui, sans-serif',
    });
    yt.textContent = year;
    svg.appendChild(yt);

    // Separator line
    if (prevYear !== null) {
      svg.appendChild(svgEl('line', {
        x1: margin.left + i * colW - 2,
        y1: margin.top - 4,
        x2: margin.left + i * colW - 2,
        y2: chartH - margin.bottom,
        stroke: 'rgba(255,255,255,0.08)', 'stroke-width': 1,
      }));
    }
    prevYear = year;
  }
});

// --- Singer labels (left side) ---
DATA.singers.forEach((s, i) => {
  const y = margin.top + i * rowH + rowH / 2;

  // Alternating row background
  if (i % 2 === 0) {
    svg.appendChild(svgEl('rect', {
      x: 0, y: y - rowH / 2,
      width: chartW, height: rowH,
      fill: 'rgba(255,255,255,0.015)',
    }));
  }

  const text = svgEl('text', {
    x: margin.left - 12, y: y + 4,
    'text-anchor': 'end', fill: '#aaa', 'font-size': '12px',
    'font-family': 'Segoe UI, system-ui, sans-serif',
  });
  text.textContent = s;
  svg.appendChild(text);
});

// --- Album labels (angled at top) ---
DATA.albums.forEach((a, i) => {
  const x = margin.left + i * colW + colW / 2;
  const text = svgEl('text', {
    x: x, y: margin.top - 22,
    'text-anchor': 'start', fill: '#555', 'font-size': '9px',
    'font-family': 'Segoe UI, system-ui, sans-serif',
    transform: `rotate(-55, ${x}, ${margin.top - 22})`,
  });
  text.textContent = a;
  svg.appendChild(text);
});

// --- Dots ---
const maxTracks = Math.max(...DATA.cells.map(c => c.tracks));

const tooltip = document.getElementById('tooltip');
const dotGroup = svgEl('g');
svg.appendChild(dotGroup);

DATA.cells.forEach(c => {
  const col = albumIdx[c.album];
  const row = singerIdx[c.singer];
  if (col === undefined || row === undefined) return;

  const cx = margin.left + col * colW + colW / 2;
  const cy = margin.top + row * rowH + rowH / 2;
  const r = 3 + Math.sqrt(c.tracks / maxTracks) * 10;

  // Color: warm gold intensity based on track count
  const t = c.tracks / maxTracks;
  const red = Math.round(180 + t * 70);
  const green = Math.round(140 + t * 56);
  const blue = Math.round(80 - t * 40);
  const color = `rgb(${red},${green},${blue})`;

  const circle = svgEl('circle', {
    cx: cx, cy: cy, r: r,
    fill: color, opacity: 0.85,
    stroke: 'rgba(255,255,255,0.15)', 'stroke-width': 0.5,
  });
  dotGroup.appendChild(circle);

  circle.addEventListener('mouseenter', (ev) => {
    const year = DATA.albumYears[c.album] || '?';
    const dir = DATA.albumDirectors[c.album] || '';
    let html = `<div style="font-weight:700; color:${color}; font-size:14px">${c.singer}</div>`;
    html += `<div style="color:#aaa; font-size:12px; margin-bottom:6px">${c.album} (${year})${dir ? ' — Dir: ' + dir : ''}</div>`;
    html += `<div style="color:#ddd">${c.tracks} track${c.tracks > 1 ? 's' : ''} on this album</div>`;
    tooltip.innerHTML = html;
    tooltip.style.display = 'block';

    // Highlight row + column
    circle.setAttribute('r', r + 2);
    circle.setAttribute('opacity', 1);
    moveTooltip(ev);
  });

  circle.addEventListener('mousemove', moveTooltip);

  circle.addEventListener('mouseleave', () => {
    tooltip.style.display = 'none';
    circle.setAttribute('r', r);
    circle.setAttribute('opacity', 0.85);
  });
});

function moveTooltip(ev) {
  let x = ev.clientX + 14, y = ev.clientY + 14;
  if (x + 280 > window.innerWidth) x = ev.clientX - 290;
  if (y + 150 > window.innerHeight) y = ev.clientY - 150;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}
