    cx: cx, cy: cy, r: r,
    fill: color, opacity: 0.85,
    stroke: 'rgba(61,28,17,0.15)', 'stroke-width': 0.5,
  });
  dotGroup.appendChild(circle);

  circle.addEventListener('mouseenter', (ev) => {
    let html = `<div style="font-weight:700; color:${color}; font-size:14px">${c.singer}</div>`;
    html += `<div style="color:#6B4226; font-size:12px; margin-bottom:6px">${c.year} &mdash; ${c.tracks} track${c.tracks > 1 ? 's' : ''} total</div>`;
    // List albums
    c.albumDetails.forEach(ad => {
      html += `<div style="color:#3D1C11; font-size:12px">&bull; ${ad.album} (${ad.tracks})</div>`;
    });
    tooltip.innerHTML = html;
    tooltip.style.display = 'block';

    circle.setAttribute('r', r + 2);
    circle.setAttribute('opacity', 1);
    moveTooltip(ev);
  });

  circle.addEventListener('mousemove', moveTooltip);

  circle.addEventListener('mouseleave', () => {
    tooltip.style.display = 'none';
    circle.setAttribute('r', r);
    circle.setAttribute('opacity', 0.85);
  });
});

function moveTooltip(ev) {
  let x = ev.clientX + 14, y = ev.clientY + 14;
  if (x + 300 > window.innerWidth) x = ev.clientX - 310;
  if (y + 200 > window.innerHeight) y = ev.clientY - 200;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

// --- Worm Chart ---
const WORM_COLORS = [
    '#B71C1C', '#C62828', '#D84315', '#E64A19', '#EF6C00',
    '#F57C00', '#F9A825', '#FFB300', '#8D6E63', '#A1887F',
    '#6D4C41', '#558B2F', '#795548', '#BF360C', '#E65100'
];

let wormDrawn = false;

function drawWorm() {
    if (wormDrawn) return;
    wormDrawn = true;

    const wormSvg = document.getElementById('worm-chart');
    const W = 900, H = 500;
    const M = {top: 40, right: 200, bottom: 50, left: 65};
    const plotW = W - M.left - M.right;
    const plotH = H - M.top - M.bottom;

    wormSvg.setAttribute('width', W);
    wormSvg.setAttribute('height', H);
    wormSvg.setAttribute('viewBox', `0 0 ${W} ${H}`);
    wormSvg.style.maxWidth = '100%';

    const series = DATA.cumulativeSeries;
    const maxCum = Math.max(...series.map(s => s.points[s.points.length - 1].cum));
    const minY = DATA.years[0], maxY = DATA.years[DATA.years.length - 1];

    function xScale(year) { return M.left + ((year - minY) / (maxY - minY)) * plotW; }
    function yScale(cum) { return M.top + plotH - (cum / maxCum) * plotH; }

    // Y-axis gridlines
    const yTicks = 5;
    for (let i = 0; i <= yTicks; i++) {
        const val = Math.round(maxCum * i / yTicks);
        const y = yScale(val);
        // Gridline
        wormSvg.appendChild(svgEl('line', {
            x1: M.left, y1: y, x2: M.left + plotW, y2: y,
            stroke: 'rgba(61,28,17,0.08)', 'stroke-width': 1
        }));
        // Label
        const label = svgEl('text', {
            x: M.left - 10, y: y + 4,
            'text-anchor': 'end', fill: '#6B4226', 'font-size': '11px',
            'font-family': 'Segoe UI, system-ui, sans-serif'
        });
        label.textContent = val;
        wormSvg.appendChild(label);
    }

    // X-axis year labels (every 2 years to avoid crowding)
    DATA.years.forEach((yr, i) => {
        if (yr % 2 !== 0 && yr !== minY && yr !== maxY) return;
        const x = xScale(yr);
        // Tick mark
        wormSvg.appendChild(svgEl('line', {
            x1: x, y1: M.top + plotH, x2: x, y2: M.top + plotH + 6,
            stroke: '#6B4226', 'stroke-width': 1
        }));
        const label = svgEl('text', {
            x: x, y: M.top + plotH + 22,
            'text-anchor': 'middle', fill: '#6B4226', 'font-size': '11px',
            'font-family': 'Segoe UI, system-ui, sans-serif'
        });
        label.textContent = yr;
        wormSvg.appendChild(label);
    });

    // Axes
    wormSvg.appendChild(svgEl('line', {
        x1: M.left, y1: M.top, x2: M.left, y2: M.top + plotH,
        stroke: '#6B4226', 'stroke-width': 1
    }));
    wormSvg.appendChild(svgEl('line', {
        x1: M.left, y1: M.top + plotH, x2: M.left + plotW, y2: M.top + plotH,
        stroke: '#6B4226', 'stroke-width': 1
    }));

    // Y-axis title
    const yTitle = svgEl('text', {
        x: 16, y: M.top + plotH / 2,
        'text-anchor': 'middle', fill: '#6B4226', 'font-size': '12px',
        'font-weight': '600',
        'font-family': 'Segoe UI, system-ui, sans-serif',
        transform: `rotate(-90, 16, ${M.top + plotH / 2})`
    });
    yTitle.textContent = 'Cumulative Tracks';
    wormSvg.appendChild(yTitle);

    // Draw lines
    const lines = [];
    series.forEach((s, i) => {
        const color = WORM_COLORS[i % WORM_COLORS.length];
        const pointsStr = s.points.map(p => `${xScale(p.year)},${yScale(p.cum)}`).join(' ');

        const line = svgEl('polyline', {
            points: pointsStr,
            fill: 'none',
            stroke: color,
            'stroke-width': 2.5,
            'stroke-linejoin': 'round',
            'stroke-linecap': 'round',
            opacity: 0.8,
            style: 'cursor: pointer; transition: opacity 0.2s, stroke-width 0.2s;'
        });
        wormSvg.appendChild(line);
        lines.push(line);

        // End label
        const lastPt = s.points[s.points.length - 1];
        const endLabel = svgEl('text', {
            x: xScale(lastPt.year) + 8,
            y: yScale(lastPt.cum) + 4,
            fill: color,
            'font-size': '11px',
            'font-weight': '600',
            'font-family': 'Segoe UI, system-ui, sans-serif',
            style: 'transition: opacity 0.2s;'
        });
        endLabel.textContent = s.singer + ' (' + lastPt.cum + ')';
        endLabel.dataset.idx = i;
        wormSvg.appendChild(endLabel);

        // Hover interactions
        line.addEventListener('mouseenter', () => {
            lines.forEach((l, j) => {
                l.setAttribute('opacity', j === i ? 1 : 0.1);
                l.setAttribute('stroke-width', j === i ? 4 : 1.5);
            });
            wormSvg.querySelectorAll('text[data-idx]').forEach(t => {
                t.setAttribute('opacity', parseInt(t.dataset.idx) === i ? 1 : 0.15);
            });
        });

        line.addEventListener('mouseleave', () => {
            lines.forEach(l => {
                l.setAttribute('opacity', 0.8);
                l.setAttribute('stroke-width', 2.5);
            });
            wormSvg.querySelectorAll('text[data-idx]').forEach(t => {
                t.setAttribute('opacity', 1);
            });
        });
    });
}

// --- View Toggle ---
function setView(v) {
    document.getElementById('dot-btn').classList.toggle('active', v === 'dot');
    document.getElementById('worm-btn').classList.toggle('active', v === 'worm');
    document.getElementById('chart').style.display = v === 'dot' ? 'block' : 'none';
    document.getElementById('worm-container').style.display = v === 'worm' ? 'block' : 'none';
    document.getElementById('subtitle').innerHTML = v === 'dot'
        ? 'Who sang in which year &middot; Dot size = tracks that year &middot; Hover for album details'
        : 'Cumulative tracks over time &middot; Top 15 singers &middot; Hover to highlight';
    if (v === 'worm') drawWorm();
}
