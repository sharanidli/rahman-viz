(function() {
  // Detect touch device
  if (!('ontouchstart' in window)) return;
  document.body.classList.add('touch-device');

  // Dismiss tooltips on tap-away
  document.addEventListener('click', function(e) {
    // Don't dismiss if tapping the tooltip itself
    if (e.target.closest('#tooltip') || e.target.closest('#edge-tooltip')) return;
    // Don't dismiss if tapping an interactive element (page handler will show new tooltip)
    if (e.target.closest('circle') || e.target.closest('.bar-row') ||
        e.target.closest('.dir-item') || e.target.closest('.cell') ||
        e.target.closest('line[style]') || e.target.closest('.dot') ||
        e.target.closest('.segment') || e.target.closest('rect[data-info]')) return;
    // Dismiss all tooltips
    var tt = document.getElementById('tooltip');
    var ett = document.getElementById('edge-tooltip');
    if (tt) tt.style.display = 'none';
    if (ett) ett.style.display = 'none';
  });

  // Recalculate SVG dimensions on orientation change
  window.addEventListener('orientationchange', function() {
    setTimeout(function() { window.dispatchEvent(new Event('resize')); }, 200);
  });
})();
</script>

  const xm = AXIS_META[xKey], ym = AXIS_META[yKey];
  return [
    { x: 0.15, y: 0.85, text: ym.highWord.charAt(0).toUpperCase() + ym.highWord.slice(1) + ' + ' + xm.lowWord.charAt(0).toUpperCase() + xm.lowWord.slice(1), sub: '' },
    { x: 0.85, y: 0.85, text: ym.highWord.charAt(0).toUpperCase() + ym.highWord.slice(1) + ' + ' + xm.highWord.charAt(0).toUpperCase() + xm.highWord.slice(1), sub: '' },
    { x: 0.15, y: 0.15, text: ym.lowWord.charAt(0).toUpperCase() + ym.lowWord.slice(1) + ' + ' + xm.lowWord.charAt(0).toUpperCase() + xm.lowWord.slice(1), sub: '' },
    { x: 0.85, y: 0.15, text: ym.lowWord.charAt(0).toUpperCase() + ym.lowWord.slice(1) + ' + ' + xm.highWord.charAt(0).toUpperCase() + xm.highWord.slice(1), sub: '' },
  ];
}

const width = window.innerWidth;
const height = window.innerHeight - 48;
const isMobile = width < 768;
const margin = { top: isMobile ? 70 : 80, right: isMobile ? 30 : 220, bottom: isMobile ? 80 : 100, left: isMobile ? 40 : 70 };
const dotR = ('ontouchstart' in window) ? 8 : 6;
const plotW = width - margin.left - margin.right;
const plotH = height - margin.top - margin.bottom;

const svg = document.getElementById('chart');
svg.setAttribute('width', width);
svg.setAttribute('height', height);

function svgEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs || {})) el.setAttribute(k, v);
  return el;
}

// Groups for layering: grid < quadrants < dots
const gridGroup = svgEl('g', { id: 'grid-group' });
const quadrantGroup = svgEl('g', { id: 'quadrant-group' });
const axisLabelGroup = svgEl('g', { id: 'axis-label-group' });
const dotGroup = svgEl('g', { id: 'dot-group' });
svg.appendChild(gridGroup);
svg.appendChild(quadrantGroup);
svg.appendChild(axisLabelGroup);
svg.appendChild(dotGroup);

// Current axis state
let currentXAxis = 'valence';
let currentYAxis = 'energy';

// --- Draw grid (static ticks, redrawn on axis change for labels) ---
function drawGrid() {
  gridGroup.innerHTML = '';
  for (let v = 0; v <= 1; v += 0.2) {
    const x = margin.left + v * plotW;
    const y = margin.top + (1 - v) * plotH;
    // Vertical grid
    gridGroup.appendChild(svgEl('line', {
      x1: x, y1: margin.top, x2: x, y2: margin.top + plotH,
      stroke: 'rgba(61,28,17,0.06)', 'stroke-width': 1,
    }));
    // Horizontal grid
    gridGroup.appendChild(svgEl('line', {
      x1: margin.left, y1: y, x2: margin.left + plotW, y2: y,
      stroke: 'rgba(61,28,17,0.06)', 'stroke-width': 1,
    }));
    // X tick labels
    const xt = svgEl('text', {
      x: x, y: margin.top + plotH + 20,
      'text-anchor': 'middle', fill: '#8D6E63', 'font-size': '11px',
      'font-family': 'Segoe UI, system-ui, sans-serif',
    });
    xt.textContent = v.toFixed(1);
    gridGroup.appendChild(xt);
    // Y tick labels
    const yt = svgEl('text', {
      x: margin.left - 12, y: y + 4,
      'text-anchor': 'end', fill: '#8D6E63', 'font-size': '11px',
      'font-family': 'Segoe UI, system-ui, sans-serif',
    });
    yt.textContent = v.toFixed(1);
    gridGroup.appendChild(yt);
  }
}

function drawAxisLabels() {
  axisLabelGroup.innerHTML = '';
  const xm = AXIS_META[currentXAxis], ym = AXIS_META[currentYAxis];

  const xLabel = svgEl('text', {
    x: margin.left + plotW / 2, y: height - 12,
    'text-anchor': 'middle', fill: '#6B4226', 'font-size': '13px',
    'font-family': 'Segoe UI, system-ui, sans-serif',
  });
  xLabel.textContent = xm.label + ' (' + xm.lowWord + ' \u2190 \u2192 ' + xm.highWord + ')';
  axisLabelGroup.appendChild(xLabel);

  const yLabel = svgEl('text', {
    x: 18, y: margin.top + plotH / 2,
    'text-anchor': 'middle', fill: '#6B4226', 'font-size': '13px',
    'font-family': 'Segoe UI, system-ui, sans-serif',
    transform: `rotate(-90, 18, ${margin.top + plotH / 2})`,
  });
  yLabel.textContent = ym.label + ' (' + ym.lowWord + ' \u2190 \u2192 ' + ym.highWord + ')';
  axisLabelGroup.appendChild(yLabel);
}

function drawQuadrants() {
  quadrantGroup.innerHTML = '';
  const quads = getQuadrantLabels(currentXAxis, currentYAxis);
  quads.forEach(q => {
    const qx = margin.left + q.x * plotW;
    const qy = margin.top + (1 - q.y) * plotH;
    const t1 = svgEl('text', {
      x: qx, y: qy, 'text-anchor': 'middle', fill: 'rgba(61,28,17,0.08)',
      'font-size': '14px', 'font-weight': '700',
      'font-family': 'Segoe UI, system-ui, sans-serif',
    });
    t1.textContent = q.text;
    quadrantGroup.appendChild(t1);
    if (q.sub) {
      const t2 = svgEl('text', {
        x: qx, y: qy + 18, 'text-anchor': 'middle', fill: 'rgba(61,28,17,0.05)',
        'font-size': '11px',
        'font-family': 'Segoe UI, system-ui, sans-serif',
      });
      t2.textContent = q.sub;
      quadrantGroup.appendChild(t2);
    }
  });
}

// --- Plot dots ---
const dotEls = DATA.tracks.map(t => {
  const cx = margin.left + t.valence * plotW;
  const cy = margin.top + (1 - t.energy) * plotH;
  const color = DATA.albumColors[t.album] || '#888';

  const circle = svgEl('circle', {
    cx: cx, cy: cy, r: dotR,
    fill: color, opacity: 0.8,
    stroke: 'rgba(61,28,17,0.15)', 'stroke-width': 0.5,
  });
  dotGroup.appendChild(circle);

  circle.addEventListener('mouseenter', (ev) => {
    if (document.body.classList.contains('touch-device')) return;
    showTooltip(ev, t, color);
  });
  circle.addEventListener('mousemove', moveTooltip);
  circle.addEventListener('mouseleave', hideTooltip);
  circle.addEventListener('click', (ev) => {
    if (!document.body.classList.contains('touch-device')) return;
    showTooltip(ev, t, color);
  });

  return { circle, data: t, color };
});

function repositionDots() {
  dotEls.forEach(d => {
    const xVal = d.data[currentXAxis];
    const yVal = d.data[currentYAxis];
    const cx = margin.left + xVal * plotW;
    const cy = margin.top + (1 - yVal) * plotH;
    d.circle.setAttribute('cx', cx);
    d.circle.setAttribute('cy', cy);
  });
}

function changeAxis() {
  currentXAxis = document.getElementById('x-axis-select').value;
  currentYAxis = document.getElementById('y-axis-select').value;
  drawGrid();
  drawAxisLabels();
  drawQuadrants();
  repositionDots();
}

// Initial draw of grid, labels, quadrants
drawGrid();
drawAxisLabels();
drawQuadrants();

// --- Legend with album filtering ---

const legend = document.getElementById('legend');
let activeAlbums = new Set(DATA.albums);
let allSelected = true;

legend.innerHTML = '<div class="toggle-row"><button id="toggle-all-btn" onclick="toggleAll()">Deselect All</button></div><h3>Albums (click to filter)</h3>';
DATA.albums.forEach(a => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  const year = DATA.albumYears[a] || '?';
  item.innerHTML = `<div class="legend-dot" style="background:${DATA.albumColors[a]}"></div>${a} (${year})`;
  item.addEventListener('click', () => toggleAlbum(a, item));
  legend.appendChild(item);
});

function toggleAlbum(album, el) {
  if (activeAlbums.has(album)) {
    activeAlbums.delete(album);
    el.classList.add('dimmed');
  } else {
    activeAlbums.add(album);
    el.classList.remove('dimmed');
  }
  // Sync toggle button text
  allSelected = activeAlbums.size === DATA.albums.length;
  document.getElementById('toggle-all-btn').textContent = allSelected ? 'Deselect All' : 'Select All';

  dotEls.forEach(d => {
    const visible = activeAlbums.has(d.data.album);
    d.circle.setAttribute('opacity', visible ? 0.8 : 0.04);
    d.circle.setAttribute('r', visible ? dotR : 3);
  });
}

function toggleAll() {
  allSelected = !allSelected;
  document.getElementById('toggle-all-btn').textContent = allSelected ? 'Deselect All' : 'Select All';
  document.querySelectorAll('.legend-item').forEach((el, i) => {
    const album = DATA.albums[i];
    if (allSelected) {
      activeAlbums.add(album);
      el.classList.remove('dimmed');
    } else {
      activeAlbums.delete(album);
      el.classList.add('dimmed');
    }
  });
  dotEls.forEach(d => {
    const visible = activeAlbums.has(d.data.album);
    d.circle.setAttribute('opacity', visible ? 0.8 : 0.04);
    d.circle.setAttribute('r', visible ? dotR : 3);
  });
}

// --- Tooltip ---

const tooltip = document.getElementById('tooltip');

function showTooltip(ev, t, color) {
  const year = DATA.albumYears[t.album] || '?';
  let html = `<div class="tt-title" style="color:${color}">${t.title}</div>`;
  html += `<div class="tt-album">${t.album} (${year})</div>`;
  html += `<div class="tt-row"><span class="tt-label">Energy</span><span class="tt-val">${t.energy}</span></div>`;
  html += `<div class="tt-row"><span class="tt-label">Valence</span><span class="tt-val">${t.valence}</span></div>`;
  html += `<div class="tt-row"><span class="tt-label">Danceability</span><span class="tt-val">${t.danceability}</span></div>`;
  html += `<div class="tt-row"><span class="tt-label">Acousticness</span><span class="tt-val">${t.acousticness}</span></div>`;
  html += `<div class="tt-row"><span class="tt-label">Rhythmic Complexity</span><span class="tt-val">${t.rhythm_complexity}</span></div>`;
  html += `<div class="tt-row"><span class="tt-label">Tempo</span><span class="tt-val">${t.tempo}</span></div>`;
  tooltip.innerHTML = html;
  tooltip.style.display = 'block';

  // Highlight same album
  dotEls.forEach(d => {
    if (activeAlbums.has(d.data.album)) {
      d.circle.setAttribute('opacity', d.data.album === t.album ? 0.95 : 0.2);
    }
  });
  moveTooltip(ev);
}

function moveTooltip(ev) {
  let x = ev.clientX + 16, y = ev.clientY + 16;
  if (x + 300 > width) x = ev.clientX - 310;
  if (y + 250 > height) y = ev.clientY - 250;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

function hideTooltip() {
  tooltip.style.display = 'none';
  dotEls.forEach(d => {
    d.circle.setAttribute('opacity', activeAlbums.has(d.data.album) ? 0.8 : 0.04);
  });
}
</script>

<script>
document.addEventListener('keydown', function(e) {
  var tag = document.activeElement.tagName;
  if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA') return;
  if (e.key === 'ArrowLeft') {
    var prev = document.querySelector('.tour-prev');
    if (prev) prev.click();
  } else if (e.key === 'ArrowRight') {
    var next = document.querySelector('.tour-next');
    if (next) next.click();
  }
});
// Auto-hide tour bar on scroll down, show on scroll up
(function() {
  var nav = document.getElementById('tour-nav');
  if (!nav) return;
  var lastY = window.scrollY || window.pageYOffset;
  var delta = 0;
  var THRESHOLD = 10;
  window.addEventListener('scroll', function() {
    var y = window.scrollY || window.pageYOffset;
    var diff = y - lastY;
    if ((delta > 0 && diff > 0) || (delta < 0 && diff < 0)) {
      delta += diff;
    } else {
      delta = diff;
    }
    if (delta > THRESHOLD && y > 60) {
      nav.classList.add('hidden');
    } else if (delta < -THRESHOLD) {
      nav.classList.remove('hidden');
    }
    lastY = y;
  }, { passive: true });
})();
</script>
