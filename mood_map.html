const width = window.innerWidth;
const height = window.innerHeight;
const margin = { top: 80, right: 220, bottom: 60, left: 70 };
const plotW = width - margin.left - margin.right;
const plotH = height - margin.top - margin.bottom;

const svg = document.getElementById('chart');
svg.setAttribute('width', width);
svg.setAttribute('height', height);

function svgEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs || {})) el.setAttribute(k, v);
  return el;
}

// --- Axes ---

// Grid lines
for (let v = 0; v <= 1; v += 0.2) {
  const x = margin.left + v * plotW;
  const y = margin.top + (1 - v) * plotH;
  // Vertical grid
  svg.appendChild(svgEl('line', {
    x1: x, y1: margin.top, x2: x, y2: margin.top + plotH,
    stroke: 'rgba(255,255,255,0.06)', 'stroke-width': 1,
  }));
  // Horizontal grid
  svg.appendChild(svgEl('line', {
    x1: margin.left, y1: y, x2: margin.left + plotW, y2: y,
    stroke: 'rgba(255,255,255,0.06)', 'stroke-width': 1,
  }));
  // X tick labels
  const xt = svgEl('text', {
    x: x, y: margin.top + plotH + 20,
    'text-anchor': 'middle', fill: '#555', 'font-size': '11px',
    'font-family': 'Segoe UI, system-ui, sans-serif',
  });
  xt.textContent = v.toFixed(1);
  svg.appendChild(xt);
  // Y tick labels
  const yt = svgEl('text', {
    x: margin.left - 12, y: y + 4,
    'text-anchor': 'end', fill: '#555', 'font-size': '11px',
    'font-family': 'Segoe UI, system-ui, sans-serif',
  });
  yt.textContent = v.toFixed(1);
  svg.appendChild(yt);
}

// Axis labels
const xLabel = svgEl('text', {
  x: margin.left + plotW / 2, y: height - 12,
  'text-anchor': 'middle', fill: '#777', 'font-size': '13px',
  'font-family': 'Segoe UI, system-ui, sans-serif',
});
xLabel.textContent = 'Valence (sad \u2190 \u2192 happy)';
svg.appendChild(xLabel);

const yLabel = svgEl('text', {
  x: 18, y: margin.top + plotH / 2,
  'text-anchor': 'middle', fill: '#777', 'font-size': '13px',
  'font-family': 'Segoe UI, system-ui, sans-serif',
  transform: `rotate(-90, 18, ${margin.top + plotH / 2})`,
});
yLabel.textContent = 'Energy (calm \u2190 \u2192 intense)';
svg.appendChild(yLabel);

// Quadrant labels
const quadrants = [
  { x: 0.15, y: 0.85, text: 'Intense + Sad', sub: '(Angry, Turbulent)' },
  { x: 0.85, y: 0.85, text: 'Intense + Happy', sub: '(Euphoric, Danceable)' },
  { x: 0.15, y: 0.15, text: 'Calm + Sad', sub: '(Melancholic, Sombre)' },
  { x: 0.85, y: 0.15, text: 'Calm + Happy', sub: '(Peaceful, Serene)' },
];
quadrants.forEach(q => {
  const qx = margin.left + q.x * plotW;
  const qy = margin.top + (1 - q.y) * plotH;
  const t1 = svgEl('text', {
    x: qx, y: qy, 'text-anchor': 'middle', fill: 'rgba(255,255,255,0.08)',
    'font-size': '14px', 'font-weight': '700',
    'font-family': 'Segoe UI, system-ui, sans-serif',
  });
  t1.textContent = q.text;
  svg.appendChild(t1);
  const t2 = svgEl('text', {
    x: qx, y: qy + 18, 'text-anchor': 'middle', fill: 'rgba(255,255,255,0.05)',
    'font-size': '11px',
    'font-family': 'Segoe UI, system-ui, sans-serif',
  });
  t2.textContent = q.sub;
  svg.appendChild(t2);
});

// --- Plot dots ---

const dotGroup = svgEl('g');
svg.appendChild(dotGroup);

const dotEls = DATA.tracks.map(t => {
  const cx = margin.left + t.valence * plotW;
  const cy = margin.top + (1 - t.energy) * plotH;
  const color = DATA.albumColors[t.album] || '#888';

  const circle = svgEl('circle', {
    cx: cx, cy: cy, r: 6,
    fill: color, opacity: 0.8,
    stroke: 'rgba(255,255,255,0.2)', 'stroke-width': 0.5,
  });
  dotGroup.appendChild(circle);

  circle.addEventListener('mouseenter', (ev) => showTooltip(ev, t, color));
  circle.addEventListener('mousemove', moveTooltip);
  circle.addEventListener('mouseleave', hideTooltip);

  return { circle, data: t, color };
});

// --- Legend with album filtering ---

const legend = document.getElementById('legend');
let activeAlbums = new Set(DATA.albums);

legend.innerHTML = '<h3>Albums (click to filter)</h3>';
DATA.albums.forEach(a => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  const year = DATA.albumYears[a] || '?';
  item.innerHTML = `<div class="legend-dot" style="background:${DATA.albumColors[a]}"></div>${a} (${year})`;
  item.addEventListener('click', () => toggleAlbum(a, item));
  legend.appendChild(item);
});

function toggleAlbum(album, el) {
  if (activeAlbums.has(album)) {
    activeAlbums.delete(album);
    el.classList.add('dimmed');
  } else {
    activeAlbums.add(album);
    el.classList.remove('dimmed');
  }
  dotEls.forEach(d => {
    const visible = activeAlbums.has(d.data.album);
    d.circle.setAttribute('opacity', visible ? 0.8 : 0.04);
    d.circle.setAttribute('r', visible ? 6 : 3);
  });
}

// --- Tooltip ---

const tooltip = document.getElementById('tooltip');

function showTooltip(ev, t, color) {
  const year = DATA.albumYears[t.album] || '?';
  let html = `<div class="tt-title" style="color:${color}">${t.title}</div>`;
  html += `<div class="tt-album">${t.album} (${year})</div>`;
  html += `<div class="tt-row"><span class="tt-label">Energy</span><span class="tt-val">${t.energy}</span></div>`;
  html += `<div class="tt-row"><span class="tt-label">Valence</span><span class="tt-val">${t.valence}</span></div>`;
  html += `<div class="tt-row"><span class="tt-label">Danceability</span><span class="tt-val">${t.danceability}</span></div>`;
  html += `<div class="tt-row"><span class="tt-label">Acousticness</span><span class="tt-val">${t.acousticness}</span></div>`;
  html += `<div class="tt-row"><span class="tt-label">Tempo</span><span class="tt-val">${t.tempo} BPM</span></div>`;
  html += `<div class="tt-row"><span class="tt-label">Loudness</span><span class="tt-val">${t.loudness} dB</span></div>`;
  tooltip.innerHTML = html;
  tooltip.style.display = 'block';

  // Highlight same album
  dotEls.forEach(d => {
    if (activeAlbums.has(d.data.album)) {
      d.circle.setAttribute('opacity', d.data.album === t.album ? 0.95 : 0.2);
    }
  });
  moveTooltip(ev);
}

function moveTooltip(ev) {
  let x = ev.clientX + 16, y = ev.clientY + 16;
  if (x + 300 > width) x = ev.clientX - 310;
  if (y + 250 > height) y = ev.clientY - 250;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

function hideTooltip() {
  tooltip.style.display = 'none';
  dotEls.forEach(d => {
    d.circle.setAttribute('opacity', activeAlbums.has(d.data.album) ? 0.8 : 0.04);
  });
}
