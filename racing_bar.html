    display: flex; align-items: center; gap: 12px;
    padding: 8px 24px 16px; flex-wrap: wrap; justify-content: center;
  }
  #controls button {

    border-color: rgba(198,40,40,0.3) !important;
    color: #C62828 !important;
  }

  #speed-control { display: flex; align-items: center; gap: 6px; }
  #speed-control label { font-size: 12px; color: #6B4226; }
  #speed-control input[type=range] { width: 80px; accent-color: #C62828; }

  #year-display {
    font-size: 72px; font-weight: 800; color: rgba(198,40,40,0.12);
    position: fixed; bottom: 30px; right: 40px;
    font-family: 'Segoe UI', system-ui, sans-serif;
    z-index: 1;
  }

  #chart-container {
    width: min(900px, 90vw);
    position: relative;
  }

  .bar-row {
    display: flex; align-items: center; height: 32px; margin-bottom: 4px;
    position: relative;
  }
  .bar-label {
    width: 160px; text-align: right; padding-right: 12px;
    font-size: 13px; font-weight: 600; color: #3D1C11;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    flex-shrink: 0;
  }
  .bar-track {
    flex: 1; position: relative; height: 26px;
  }
  .bar-fill {
    height: 100%; border-radius: 4px;
    transition: width 0.8s ease-in-out;
    position: relative;
    min-width: 2px;
  }
  .bar-count {
    position: absolute; right: -40px; top: 50%; transform: translateY(-50%);
    font-size: 12px; font-weight: 700; color: #6B4226;
    min-width: 35px;
  }

  #mode-toggle { display: flex; gap: 0; }
  #mode-toggle button {
    border-radius: 0; border-right: none;
  }
  #mode-toggle button:first-child { border-radius: 6px 0 0 6px; }

const BAR_COLORS = [
  '#B71C1C', '#C62828', '#D84315', '#E64A19', '#EF6C00',
  '#F57C00', '#F9A825', '#FFB300', '#8D6E63', '#A1887F',
  '#6D4C41', '#558B2F', '#D84315', '#C62828', '#B71C1C'
];

let mode = 'singers';
let currentYearIdx = 0;
let playing = false;
let playInterval = null;

const container = document.getElementById('chart-container');
const yearDisplay = document.getElementById('year-display');

function getSnapshots() {
  return mode === 'singers' ? DATA.singerSnapshots : DATA.heroSnapshots;
}

function renderYear(yearIdx) {
  const year = DATA.years[yearIdx];
  const snapshots = getSnapshots();
  const entries = snapshots[String(year)] || [];
  const maxCount = entries.length ? entries[0].count : 1;
  const barWidth = container.clientWidth - 200;

  yearDisplay.textContent = year;

  // Build or update bars
  let existing = container.querySelectorAll('.bar-row');

  // Clear and rebuild for simplicity during mode switches
  if (existing.length === 0 || container.dataset.mode !== mode) {
    container.innerHTML = '';
    container.dataset.mode = mode;
    existing = [];
  }

  // Ensure we have 15 rows
  while (container.children.length < 15) {
    const row = document.createElement('div');
    row.className = 'bar-row';
    row.innerHTML = `
      <div class="bar-label"></div>
      <div class="bar-track">
        <div class="bar-fill">
          <span class="bar-count"></span>
        </div>
      </div>
    `;
    container.appendChild(row);
  }

  const rows = container.querySelectorAll('.bar-row');
  for (let i = 0; i < 15; i++) {
    const row = rows[i];
    const entry = entries[i];
    const label = row.querySelector('.bar-label');
    const fill = row.querySelector('.bar-fill');
    const count = row.querySelector('.bar-count');

    if (entry) {
      label.textContent = entry.name;
      const pct = (entry.count / maxCount) * 100;
      fill.style.width = pct + '%';
      fill.style.background = BAR_COLORS[i % BAR_COLORS.length];
      count.textContent = entry.count;
      row.style.opacity = 1;
    } else {
      label.textContent = '';
      fill.style.width = '0%';
      count.textContent = '';
      row.style.opacity = 0;
    }
  }
}

function setMode(m) {
  mode = m;
  document.getElementById('singers-btn').classList.toggle('active', m === 'singers');
  document.getElementById('heroes-btn').classList.toggle('active', m === 'heroes');
  container.innerHTML = '';
  renderYear(currentYearIdx);
}

function togglePlay() {
  playing = !playing;
  const btn = document.getElementById('play-btn');
  if (playing) {
    btn.innerHTML = '&#9632; Stop';
    btn.classList.add('active');
    if (currentYearIdx >= DATA.years.length - 1) currentYearIdx = 0;
    advanceYear();
  } else {
    btn.innerHTML = '&#9654; Play';
    btn.classList.remove('active');
    clearTimeout(playInterval);
  }
}

function advanceYear() {
  if (!playing) return;
  if (currentYearIdx < DATA.years.length - 1) {
    currentYearIdx++;
    renderYear(currentYearIdx);
    const speed = parseInt(document.getElementById('speed').value);
    playInterval = setTimeout(advanceYear, speed);
  } else {
    playing = false;
    const btn = document.getElementById('play-btn');
    btn.innerHTML = '&#9654; Play';
    btn.classList.remove('active');
  }
}

// Keyboard: left/right arrows, space for play/pause
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' && currentYearIdx < DATA.years.length - 1) {
    currentYearIdx++;
    renderYear(currentYearIdx);
  }
  if (e.key === 'ArrowLeft' && currentYearIdx > 0) {
    currentYearIdx--;
    renderYear(currentYearIdx);
  }
  if (e.key === ' ') { e.preventDefault(); togglePlay(); }
});

// Init
renderYear(0);
</script>
