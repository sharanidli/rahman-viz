const cellW = 48;
const cellH = 32;
const labelWLeft = 180;  // lyricist label width
const headerH = 160;     // singer labels (angled)
const margin = { top: headerH, left: labelWLeft, right: 40, bottom: 20 };

const chartW = margin.left + DATA.singers.length * cellW + margin.right;
const chartH = margin.top + DATA.lyricists.length * cellH + margin.bottom;

const svg = document.getElementById('chart');
svg.setAttribute('width', chartW);
svg.setAttribute('height', chartH);

function svgEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs || {})) el.setAttribute(k, v);
  return el;
}

const lyricistIdx = {};
DATA.lyricists.forEach((l, i) => lyricistIdx[l] = i);
const singerIdx = {};
DATA.singers.forEach((s, i) => singerIdx[s] = i);

// --- Singer labels (angled at top) ---
DATA.singers.forEach((s, i) => {
  const x = margin.left + i * cellW + cellW / 2;
  const total = DATA.singerTotals[s];
  const text = svgEl('text', {
    x: x, y: margin.top - 12,
    'text-anchor': 'start', fill: '#aaa', 'font-size': '11px',
    'font-family': 'Segoe UI, system-ui, sans-serif',
    transform: `rotate(-55, ${x}, ${margin.top - 12})`,
  });
  text.textContent = `${s} (${total})`;
  svg.appendChild(text);
});

// --- Lyricist labels (left side) ---
DATA.lyricists.forEach((l, i) => {
  const y = margin.top + i * cellH + cellH / 2;
  const total = DATA.lyricistTotals[l];

  // Alternating row background
  if (i % 2 === 0) {
    svg.appendChild(svgEl('rect', {
      x: 0, y: y - cellH / 2,
      width: chartW, height: cellH,
      fill: 'rgba(255,255,255,0.015)',
    }));
  }

  const text = svgEl('text', {
    x: margin.left - 12, y: y + 4,
    'text-anchor': 'end', fill: '#aaa', 'font-size': '12px',
    'font-family': 'Segoe UI, system-ui, sans-serif',
  });
  text.textContent = `${l} (${total})`;
  svg.appendChild(text);
});

// --- Heatmap cells ---
const tooltip = document.getElementById('tooltip');
const cellGroup = svgEl('g');
svg.appendChild(cellGroup);

// Color scale: dark to bright warm
function cellColor(count) {
  const t = Math.sqrt(count / DATA.maxCount);
  const r = Math.round(40 + t * 210);
  const g = Math.round(20 + t * 140);
  const b = Math.round(40 - t * 20);
  return `rgb(${r},${g},${b})`;
}

DATA.cells.forEach(c => {
  const col = singerIdx[c.singer];
  const row = lyricistIdx[c.lyricist];
  if (col === undefined || row === undefined) return;

  const x = margin.left + col * cellW;
  const y = margin.top + row * cellH;
  const color = cellColor(c.tracks);

  const rect = svgEl('rect', {
    x: x + 1, y: y + 1,
    width: cellW - 2, height: cellH - 2,
    fill: color,
    rx: 3, ry: 3,
    opacity: 0.9,
  });
  cellGroup.appendChild(rect);

  // Count label inside cell
  if (c.tracks >= 2) {
    const label = svgEl('text', {
      x: x + cellW / 2, y: y + cellH / 2 + 4,
      'text-anchor': 'middle', fill: '#fff',
      'font-size': '11px', 'font-weight': '600',
      'font-family': 'Segoe UI, system-ui, sans-serif',
      'pointer-events': 'none',
    });
    label.textContent = c.tracks;
    cellGroup.appendChild(label);
  }

  rect.addEventListener('mouseenter', (ev) => {
    let html = `<div style="font-weight:700; color:${color}; font-size:15px">${c.lyricist} + ${c.singer}</div>`;
    html += `<div style="color:#ddd; margin-top:6px">${c.tracks} track${c.tracks > 1 ? 's' : ''} together</div>`;
    html += `<div style="color:#888; margin-top:4px; font-size:11px">${c.lyricist}: ${DATA.lyricistTotals[c.lyricist]} total tracks</div>`;
    html += `<div style="color:#888; font-size:11px">${c.singer}: ${DATA.singerTotals[c.singer]} total tracks</div>`;
    tooltip.innerHTML = html;
    tooltip.style.display = 'block';
    rect.setAttribute('opacity', 1);
    rect.setAttribute('stroke', '#fff');
    rect.setAttribute('stroke-width', '2');
    moveTooltip(ev);
  });

  rect.addEventListener('mousemove', moveTooltip);

  rect.addEventListener('mouseleave', () => {
    tooltip.style.display = 'none';
    rect.setAttribute('opacity', 0.9);
    rect.removeAttribute('stroke');
    rect.removeAttribute('stroke-width');
  });
});

function moveTooltip(ev) {
  let x = ev.clientX + 14, y = ev.clientY + 14;
  if (x + 280 > window.innerWidth) x = ev.clientX - 290;
  if (y + 150 > window.innerHeight) y = ev.clientY - 150;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}
</script>
