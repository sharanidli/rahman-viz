  document.body.classList.add('touch-device');

  document.addEventListener('click', function(e) {
    // Don't dismiss if tapping the tooltip itself
    if (e.target.closest('#tooltip') || e.target.closest('#edge-tooltip')) return;
    // Don't dismiss if tapping an interactive element (page handler will show new tooltip)

    if (tt) tt.style.display = 'none';
    if (ett) ett.style.display = 'none';
  });

  // Recalculate SVG dimensions on orientation change

    setTimeout(function() { window.dispatchEvent(new Event('resize')); }, 200);

function escHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function singerLink(raw) {
  if (!raw) return '';
  var M = window.__SINGER_MANIFEST, bp = window.__singerBasePath || '';
  var parts = raw.replace(/ & /g, ', ').split(',');
  var out = [];
  for (var i = 0; i < parts.length; i++) {
    var name = parts[i].trim();
    if (!name) continue;
    var slug = M[name];
    if (slug) out.push('<a href="' + bp + 'singers/' + slug + '.html" class="singer-link">' + escHtml(name) + '</a>');
    else out.push(escHtml(name));
  }
  return out.join(', ');

// Build language filter options
const allLangs = new Set();
SINGERS.forEach(function(s) { s.languages.forEach(function(l) { allLangs.add(l); }); });
const langSelect = document.getElementById('lang-filter');
Array.from(allLangs).sort().forEach(function(l) {
  var opt = document.createElement('option');
  opt.value = l;
  opt.textContent = l;
  langSelect.appendChild(opt);
});

function render() {
  var q = document.getElementById('search').value.toLowerCase().trim();
  var sortBy = document.getElementById('sort').value;
  var langFilter = langSelect.value;

  var filtered = SINGERS.filter(function(s) {
    if (q && s.name.toLowerCase().indexOf(q) < 0) return false;
    if (langFilter !== 'All' && s.languages.indexOf(langFilter) < 0) return false;
    return true;
  });

  // Sort
  if (sortBy === 'tracks') {
    filtered.sort(function(a, b) { return b.tracks - a.tracks; });
  } else if (sortBy === 'alpha') {
    filtered.sort(function(a, b) { return a.name.localeCompare(b.name); });
  } else if (sortBy === 'films') {
    filtered.sort(function(a, b) { return b.films - a.films; });
  } else if (sortBy === 'recent') {
    filtered.sort(function(a, b) {
      var ya = a.years ? parseInt(a.years.split('\u2013').pop() || a.years) : 0;
      var yb = b.years ? parseInt(b.years.split('\u2013').pop() || b.years) : 0;
      return yb - ya;
    });
  }

  var html = '';
  filtered.forEach(function(s) {
    var langBadges = s.languages.map(function(l) {
      return '<span class="lang-badge">' + l + '</span>';
    }).join('');
    html += '<a class="singer-card" href="' + s.slug + '.html">';
    html += '<div class="sc-name">' + s.name + '</div>';
    html += '<div class="sc-stats">' + s.tracks + ' tracks &middot; ' + s.films + ' films</div>';
    html += '<div class="sc-years">' + s.years + '</div>';
    html += '<div class="sc-langs">' + langBadges + '</div>';
    html += '</a>';
  });

  document.getElementById('grid').innerHTML = html || '<div class="no-results">No singers match your search</div>';
  document.getElementById('result-count').textContent = filtered.length + ' of ' + SINGERS.length + ' singers';
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('sort').addEventListener('change', render);
langSelect.addEventListener('change', render);

render();
</script>

<button id="feedback-btn" onclick="toggleFeedback()" aria-label="Send feedback" title="Send feedback">&#9993;</button>
<div id="feedback-panel">
  <form id="feedback-form" action="https://formspree.io/f/xojkalry" method="POST">
    <h3>Send us feedback</h3>
    <textarea name="message" placeholder="What did you like? What could be better?" required></textarea>
    <input type="email" name="_replyto" placeholder="Email (optional)">
    <div class="fb-hint">We read every message.</div>
    <input type="hidden" name="_subject" value="Rahman Viz Feedback">
    <input type="hidden" name="page" id="fb-page">
    <button type="submit">Send Feedback</button>
  </form>
</div>
<script>
function toggleFeedback() {
  var p = document.getElementById('feedback-panel');
  p.classList.toggle('open');
  document.getElementById('fb-page').value = location.pathname;
}
document.getElementById('feedback-form').addEventListener('submit', function(e) {
  e.preventDefault();
  var form = this;
  fetch(form.action, {
    method: 'POST',
    body: new FormData(form),
    headers: { 'Accept': 'application/json' }
  }).then(function(r) {
    if (r.ok) {
      form.innerHTML = '<div class="fb-thanks">Thanks for your feedback!</div>';
      setTimeout(function() {
        document.getElementById('feedback-panel').classList.remove('open');
      }, 2000);
    }
  });
});
document.addEventListener('click', function(e) {
  var panel = document.getElementById('feedback-panel');
  var btn = document.getElementById('feedback-btn');
  if (panel.classList.contains('open') && !panel.contains(e.target) && e.target !== btn) {
    panel.classList.remove('open');
  }
});
</script>
