var FEAT_LABELS = {en:'Energy', da:'Danceability', va:'Valence', ac:'Acousticness', rc:'Rhythm', tp:'Tempo'};
var FEAT_COLORS = {en:'#C62828', da:'#E64A19', va:'#F9A825', ac:'#558B2F', rc:'#1565C0', tp:'#8D6E63'};

document.getElementById('track-count').textContent =
  DATA.tracks.length + ' tracks with audio features';

const searchInput = document.getElementById('search');
const resultsDiv = document.getElementById('results');
const siblingView = document.getElementById('sibling-view');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.toLowerCase().trim();
  if (q.length < 2) { resultsDiv.innerHTML = ''; return; }

  const matches = [];
  DATA.tracks.forEach((t, i) => {
    const score = (t.title.toLowerCase().includes(q) ? 2 : 0) +
                  (t.album.toLowerCase().includes(q) ? 1 : 0);
    if (score > 0) matches.push({ idx: i, score });
  });
  matches.sort((a, b) => b.score - a.score);

  resultsDiv.innerHTML = matches.slice(0, 15).map(m => {
    const t = DATA.tracks[m.idx];
    const year = t.year || '?';
    return `<div class="search-result" onclick="selectTrack(${m.idx})">
      <span class="sr-title">${t.title}</span>
      <span class="sr-album">${t.album} (${year})</span>
    </div>`;
  }).join('');
});

function featureBarsHTML(track, compareTrack) {
  let html = '<div class="feature-bars">';
  DATA.features.forEach(f => {
    const val = track[f];
    const color = FEAT_COLORS[f] || '#C62828';
    const pct = (val * 100).toFixed(0);
    let compareBar = '';
    if (compareTrack) {
      const cval = compareTrack[f];
      compareBar = `<div style="position:absolute;left:${(cval*100).toFixed(0)}%;top:0;width:2px;height:100%;background:rgba(61,28,17,0.4);border-radius:1px" title="Selected: ${cval.toFixed(2)}"></div>`;
    }
    html += `<div class="feat-label">${FEAT_LABELS[f]}</div>`;
    html += `<div class="feat-bar-bg"><div class="feat-bar-fill" style="width:${pct}%;background:${color};position:relative">${compareBar}</div></div>`;
    html += `<div class="feat-val">${val.toFixed(2)}</div>`;
  });
  html += '</div>';
  return html;
}

function selectTrack(idx) {
  resultsDiv.innerHTML = '';
  searchInput.value = '';
  siblingView.style.display = 'block';

  const track = DATA.tracks[idx];
  const year = track.year || '?';

  let html = `<div class="song-title">${track.title}</div>`;
  html += `<div class="song-album">${track.album} (${year})</div>`;
  html += featureBarsHTML(track);
  document.getElementById('selected-song').innerHTML = html;

  const sibs = DATA.siblings[idx].siblings;
  let sibsHTML = '';
  sibs.forEach(s => {
    const st = DATA.tracks[s.idx];
    const syear = st.year || '?';
    sibsHTML += `<div class="sibling-card" onclick="selectTrack(${s.idx})">`;
    sibsHTML += `<div class="sibling-header">`;
    sibsHTML += `<span class="sibling-title">${st.title}</span>`;
    sibsHTML += `<span class="sibling-sim">${(s.sim * 100).toFixed(0)}% similar</span>`;
    sibsHTML += `</div>`;
    sibsHTML += `<div class="sibling-album">${st.album} (${syear})</div>`;
    sibsHTML += featureBarsHTML(st, track);
    sibsHTML += `</div>`;
  });
  document.getElementById('siblings-list').innerHTML = sibsHTML;

  siblingView.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
